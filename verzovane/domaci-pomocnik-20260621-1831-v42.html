function getTier(xp) {
  let cur = HERO_TIERS[0];
  for (var i = 0; i < HERO_TIERS.length; i++) {
    if (xp >= HERO_TIERS[i].min) cur = HERO_TIERS[i];
  }
  return cur;
}
function getNextTier(xp) {
  for (var i = 0; i < HERO_TIERS.length; i++) {
    if (xp < HERO_TIERS[i].min) return HERO_TIERS[i];
  }
  return null;
}

function rollLoot(forceRarity) {
  let pool = LOOT_TABLE;
  if (forceRarity) pool = LOOT_TABLE.filter(l => l.rarity === forceRarity);
  if (pool.length === 0) pool = LOOT_TABLE;
  const total = pool.reduce((s, l) => s + l.weight, 0);
  let r = Math.random() * total;
  for (var i = 0; i < pool.length; i++) {
    r -= pool[i].weight;
    if (r <= 0) return pool[i];
  }
  return pool[0];
}

// Vrátí ISO datum pondělí toho týdne (pro identifikaci týdne)
function getWeekId() {
  const d = new Date();
  const day = (d.getDay() + 6) % 7; // pondělí=0
  d.setDate(d.getDate() - day);
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function getBossForWeek(weekId) {
  // Deterministicky vyber bosse pro týden (hash z weekId)
  let hash = 0;
  for (let i = 0; i < weekId.length; i++) hash = (hash * 31 + weekId.charCodeAt(i)) | 0;
  return BOSS_ROSTER[Math.abs(hash) % BOSS_ROSTER.length];
}

// Návrh oblečení podle teploty
// rainProb = 0-1 (jen pokud opravdu prší — práh 60%)
// wind = km/h
function suggestOutfit(tempC, rainProb, wind) {
  if (tempC == null) return null;
  var parts = [];
  if (tempC < -5)       parts.push({ icon:'🧥', t:'zimní bunda' }, { icon:'🧣', t:'šála a čepice' }, { icon:'🧤', t:'rukavice' });
  else if (tempC < 5)   parts.push({ icon:'🧥', t:'zimní bunda' }, { icon:'🧢', t:'čepice' });
  else if (tempC < 12)  parts.push({ icon:'🧥', t:'teplá bunda' });
  else if (tempC < 18)  parts.push({ icon:'🧥', t:'mikina nebo lehká bunda' });
  else if (tempC < 23)  parts.push({ icon:'👕', t:'tričko + mikina v batohu' });
  else                  parts.push({ icon:'👕', t:'tričko a kraťasy' });
  // Deštník jen když je opravdu velká šance že bude pršet (60%+)
  if (rainProb != null && rainProb > 0.6) parts.push({ icon:'☔', t:'pláštěnka nebo deštník' });
  if (wind != null && wind > 35)  parts.push({ icon:'💨', t:'pozor, fouká!' });
  return parts;
}

// ====================================================================
// AUDIO HOOK
// ====================================================================

function useAudio() {
  const acRef = useRef(null);
  const unlockedRef = useRef(false);
  const ensure = useCallback(() => {
    if (!acRef.current) {
      try { acRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (acRef.current && acRef.current.state === 'suspended') {
      try { acRef.current.resume(); } catch(e) {}
    }
    return acRef.current;
  }, []);

  // KRITICKÉ: AudioContext musí být odblokovaný gestem uživatele.
  // Bez tohoto by zvuky neza­hrály vůbec nebo až po druhém kliknutí.
  useEffect(() => {
    const unlock = () => {
      if (unlockedRef.current) return;
      const ac = ensure();
      if (!ac) return;
      // krátký tichý oscilátor pro garantované odblokování v Safari/iOS
      try {
        const o = ac.createOscillator(), g = ac.createGain();
        g.gain.value = 0.0001;
        o.connect(g); g.connect(ac.destination);
        o.start(0); o.stop(ac.currentTime + 0.01);
      } catch(e) {}
      if (ac.state !== 'suspended') unlockedRef.current = true;
    };
    const events = ['pointerdown','touchstart','keydown','click'];
    events.forEach(ev => document.addEventListener(ev, unlock, { capture:true, passive:true }));
    return () => { events.forEach(ev => document.removeEventListener(ev, unlock, { capture:true })); };
  }, [ensure]);

  const tone = useCallback((freq, dur, when, type, gain) => {
    const ac = ensure(); if (!ac) return;
    const t = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.02);
  }, [ensure]);
  return useMemo(() => ({
    ding:   () => { tone(880, 0.16, 0, 'sine', 0.18); tone(1318, 0.2, 0.05, 'sine', 0.15); },
    coin:   () => { tone(988, 0.08, 0, 'square', 0.12); tone(1319, 0.13, 0.07, 'square', 0.12); },
    success:() => { [523,659,784,1047].forEach((f,i) => tone(f, 0.4, i*0.1, 'triangle', 0.16)); },
    undo:   () => { tone(300, 0.14, 0, 'sine', 0.12); },
    tap:    () => { tone(660, 0.06, 0, 'sine', 0.08); },
    ensure,
  }), [tone, ensure]);
}

function useConfetti() {
  const ref = useRef(null);
  const fire = useCallback((opts) => {
    const root = ref.current; if (!root) return;
    const colors = ['#ff4d8d','#8b5cf6','#22d3ee','#a3e635','#fbbf24','#fb7185'];
    const rect = root.getBoundingClientRect();
    const cx = (opts && opts.x != null) ? opts.x : rect.width/2;
    const cy = (opts && opts.y != null) ? opts.y : rect.height/2;
    const n = (opts && opts.n) || 70;
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      const sz = 8 + Math.random() * 10;
      d.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[i % colors.length]};border-radius:${Math.random() < 0.5 ? '50%' : '3px'};`;
      root.appendChild(d);
      const ang = Math.random() * Math.PI * 2, dist = 120 + Math.random() * 320;
      const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist - (120 + Math.random() * 220);
      d.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px,${dy + 260}px) rotate(${Math.random()*900 - 450}deg)`, opacity: 1, offset: 0.7 },
        { transform: `translate(${dx*1.1}px,${dy + 460}px) rotate(${Math.random()*900}deg)`, opacity: 0 }
      ], { duration: 1100 + Math.random()*800, easing: 'cubic-bezier(.2,.6,.3,1)' }).onfinish = () => d.remove();
    }
  }, []);
  return { ref, fire };
}

// ====================================================================
// WEATHER HOOK (Open-Meteo, žádný API klíč)
// ====================================================================

function useWeather(soundOn) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const cacheKey = 'dompomocnik_weather_cache';
    // load cache first
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const c = JSON.parse(cached);
        if (Date.now() - c.t < 30*60*1000) {
          setData(c.d);
        }
      }
    } catch(e) {}

    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + LOCATION.lat
      + '&longitude=' + LOCATION.lon
      + '&current=temperature_2m,weather_code,wind_speed_10m,precipitation'
      + '&daily=temperature_2m_min,temperature_2m_max,precipitation_probability_max,weather_code'
      + '&timezone=Europe%2FPrague&forecast_days=1';

    fetch(url)
      .then(r => r.json())
      .then(j => {
        if (cancelled) return;
        const cur = j.current || {};
        const day = (j.daily || {});
        const d = {
          temp: cur.temperature_2m,
          wind: cur.wind_speed_10m,
          precip: cur.precipitation,
          code: cur.weather_code,
          tmin: day.temperature_2m_min ? day.temperature_2m_min[0] : null,
          tmax: day.temperature_2m_max ? day.temperature_2m_max[0] : null,
          rainProb: day.precipitation_probability_max ? day.precipitation_probability_max[0] : null
        };
        setData(d);
        try { localStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d })); } catch(e) {}
      })
      .catch(e => { if (!cancelled) setErr(e.message); });

    return () => { cancelled = true; };
  }, []);

  // WMO code → emoji + popis
  const visual = useMemo(() => {
    if (!data) return null;
    const c = data.code;
    let icon = '☀️', label = 'jasno';
    if (c == 0) { icon='☀️'; label='jasno'; }
    else if (c <= 3) { icon='⛅'; label='polojasno'; }
    else if (c <= 48) { icon='🌫️'; label='mlha'; }
    else if (c <= 57) { icon='🌦️'; label='mrholí'; }
    else if (c <= 67) { icon='🌧️'; label='déšť'; }
    else if (c <= 77) { icon='🌨️'; label='sníh'; }
    else if (c <= 82) { icon='🌧️'; label='přeháňky'; }
    else if (c <= 86) { icon='🌨️'; label='sněhové přeháňky'; }
    else { icon='⛈️'; label='bouřka'; }
    return { icon, label };
  }, [data]);

  const outfit = useMemo(() => {
    if (!data) return null;
    // Pro doporučení oblečení použij max denní teplotu (kid bude venku v nejteplejším čase),
    // ne aktuální (ráno bývá mnohem chladněji než odpoledne)
    const t = data.tmax != null ? data.tmax : data.temp;
    return suggestOutfit(t, (data.rainProb||0)/100, data.wind);
  }, [data]);

  return { data, err, visual, outfit };
}

// ====================================================================
// TTS HOOK (Web Speech API - česky pokud dostupné)
// ====================================================================

function useTTS(enabled) {
  const voiceRef = useRef(null);
  const lastSpokenRef = useRef({ key: null, t: 0 });

  useEffect(() => {
    if (!('speechSynthesis' in window)) return;
    const pickVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      // preferuj čeština, jinak slovenština, jinak default
      let v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith('cs'));
      if (!v) v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith('sk'));
      if (!v) v = voices[0];
      voiceRef.current = v || null;
    };
    pickVoice();
    window.speechSynthesis.onvoiceschanged = pickVoice;
    return () => { window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const speak = useCallback((key, text) => {
    if (!enabled) return;
    if (!('speechSynthesis' in window)) return;
    // anti-spam: stejný klíč max 1x za 8s
    const now = Date.now();
    if (lastSpokenRef.current.key === key && now - lastSpokenRef.current.t < 8000) return;
    lastSpokenRef.current = { key, t: now };
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (voiceRef.current) u.voice = voiceRef.current;
      u.lang = (voiceRef.current && voiceRef.current.lang) || 'cs-CZ';
      u.rate = 1.0; u.pitch = 1.05; u.volume = 0.95;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }, [enabled]);

  const sayRandom = useCallback((key, pool) => {
    if (!pool || !pool.length) return;
    const text = pool[Math.floor(Math.random()*pool.length)];
    speak(key, text);
  }, [speak]);

  return { speak, sayRandom };
}

// ====================================================================
// MASCOT (Lišák {mascotName}) - SVG-free pure divs, per prototype
// ====================================================================

function Mascot({ size, sleeping, dancing, onTap }) {
  const s = size || 96;
  const scale = s / 96;
  const px = (n) => Math.round(n * scale) + 'px';
  const floatAnim = sleeping ? 'floatY 6s ease-in-out infinite' : (dancing ? 'softPulse 0.6s ease-in-out infinite' : 'floatY 3.4s ease-in-out infinite');
  const eyeAnim = sleeping ? 'none' : 'blink 5s infinite';
  const mouthBorder = sleeping ? `${Math.max(2,Math.round(3*scale))}px solid #2a2240` : `${Math.max(2,Math.round(3*scale))}px solid #2a2240`;
  return (
    <div onClick={onTap} style={{ width: s, height: s, position:'relative', animation: floatAnim, cursor: onTap ? 'pointer' : 'default' }}>
      <div style={{ position:'absolute', inset:0, borderRadius:'50% 50% 48% 48%', background:'linear-gradient(160deg, var(--accent2Lt), var(--accent2))', boxShadow:'inset 0 -10px 18px rgba(0,0,0,.12), 0 10px 22px -8px var(--accent2)' }}/>
      <div style={{ position:'absolute', top: px(-9), left: px(14), width: px(30), height: px(30), background:'var(--accent2)', borderRadius:'50% 50% 10% 50%', transform: sleeping ? 'rotate(-30deg)' : 'rotate(-18deg)' }}/>
      <div style={{ position:'absolute', top: px(-9), right: px(14), width: px(30), height: px(30), background:'var(--accent2)', borderRadius:'50% 50% 50% 10%', transform: sleeping ? 'rotate(30deg)' : 'rotate(18deg)' }}/>
      {sleeping ? (
        <React.Fragment>
          {/* zavřená očka */}
          <div style={{ position:'absolute', top: px(46), left: px(24), width: px(16), height: px(3), background:'#2a2240', borderRadius:'2px' }}/>
          <div style={{ position:'absolute', top: px(46), right: px(24), width: px(16), height: px(3), background:'#2a2240', borderRadius:'2px' }}/>
          {/* ZZZ */}
          <div style={{ position:'absolute', top: px(-18), right: px(-6), fontSize: px(20), color:'#fff', opacity:.85, animation:'floatY 2.4s ease-in-out infinite' }}>z</div>
          <div style={{ position:'absolute', top: px(-32), right: px(2), fontSize: px(14), color:'#fff', opacity:.65, animation:'floatY 2.4s ease-in-out infinite .4s' }}>z</div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div style={{ position:'absolute', top: px(38), left: px(24), width: px(16), height: px(18), background:'#fff', borderRadius:'50%', animation: eyeAnim }}>
            <div style={{ position:'absolute', bottom: px(3), left: px(4), width: px(8), height: px(8), background:'#2a2240', borderRadius:'50%' }}/>
          </div>
          <div style={{ position:'absolute', top: px(38), right: px(24), width: px(16), height: px(18), background:'#fff', borderRadius:'50%', animation: eyeAnim }}>
            <div style={{ position:'absolute', bottom: px(3), left: px(4), width: px(8), height: px(8), background:'#2a2240', borderRadius:'50%' }}/>
          </div>
        </React.Fragment>
      )}
      <div style={{ position:'absolute', top: px(60), left:'50%', transform:'translateX(-50%)', width: px(14), height: px(8), borderBottom: mouthBorder, borderRadius:'0 0 12px 12px' }}/>
      <div style={{ position:'absolute', top: px(55), left: px(13), width: px(13), height: px(8), background:'var(--accentLt)', borderRadius:'50%', opacity:.7 }}/>
      <div style={{ position:'absolute', top: px(55), right: px(13), width: px(13), height: px(8), background:'var(--accentLt)', borderRadius:'50%', opacity:.7 }}/>
    </div>
  );
}

  // ---------------------- v15: Google Calendar fetch ----------------------
  const parseICal = useCallback((text) => {
    // v41: Robustnější iCal parser
    // - Filtruje STATUS:CANCELLED
    // - Podporuje opakující se události (RRULE FREQ=DAILY/WEEKLY)
    // - DTSTART s TZID i UTC i all-day
    // - SUMMARY se escapováním + fallback na "(bez názvu)"
    // - Filtruje EXDATE (vyjímky z opakování)
    if (!text || typeof text !== 'string') return [];
    const rawBlocks = text.split('BEGIN:VEVENT');
    const parsedEvents = [];

    for (let i = 1; i < rawBlocks.length; i++) {
      const block = rawBlocks[i].split('END:VEVENT')[0];
      const ev = { exdates: [] };
      // Unfold (CRLF + space/tab pokračování)
      const lines = block.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '').split(/\r?\n/);
      let cancelled = false;

      for (const line of lines) {
        if (line.startsWith('STATUS:')) {
          if (line.slice(7).trim().toUpperCase() === 'CANCELLED') cancelled = true;
        } else if (line.startsWith('SUMMARY')) {
          // SUMMARY:Foo nebo SUMMARY;LANGUAGE=cs:Foo
          const colonIdx = line.indexOf(':');
          if (colonIdx >= 0) {
            ev.summary = line.slice(colonIdx + 1).replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\n/gi, ' ').replace(/\\\\/g, '\\').trim();
          }
        } else if (line.startsWith('DTSTART')) {
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          if (val) {
            const allDay = !val.includes('T');
            ev.start = val;
            ev.allDay = allDay;
            const y = val.slice(0, 4), m = val.slice(4, 6), d = val.slice(6, 8);
            const hh = allDay ? '00' : val.slice(9, 11);
            const mm = allDay ? '00' : val.slice(11, 13);
            ev.iso = `${y}-${m}-${d}`;
            ev.time = allDay ? '' : `${hh}:${mm}`;
            ev.dateTime = `${y}-${m}-${d}T${hh}:${mm}:00`;
            ev.startDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d), parseInt(hh), parseInt(mm));
          }
        } else if (line.startsWith('DTEND')) {
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          if (val) ev.end = val;
        } else if (line.startsWith('LOCATION:')) {
          ev.location = line.slice(9).replace(/\\,/g, ',').trim();
        } else if (line.startsWith('UID:')) {
          ev.uid = line.slice(4).trim();
        } else if (line.startsWith('RRULE:')) {
          // Parse RRULE např: FREQ=WEEKLY;BYDAY=MO,WE,FR;UNTIL=20271231T000000Z
          const rules = {};
          line.slice(6).split(';').forEach(part => {
            const [k, v] = part.split('=');
            if (k && v) rules[k.toUpperCase()] = v;
          });
          ev.rrule = rules;
        } else if (line.startsWith('EXDATE')) {
          // EXDATE;TZID=...:YYYYMMDDTHHMMSS  nebo  EXDATE:YYYYMMDD
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          // Multiple dates oddělené čárkou
          val.split(',').forEach(d => {
            if (d.length >= 8) ev.exdates.push(d.slice(0, 8)); // YYYYMMDD
          });
        }
      }

      if (cancelled) continue;
      if (!ev.iso) continue;
      // Default summary pokud chybí
      if (!ev.summary) ev.summary = '(bez názvu)';

      parsedEvents.push(ev);
    }

    // Expanduj recurring events do konkrétních výskytů
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const horizon = new Date(today); horizon.setDate(today.getDate() + 90); // 3 měsíce dopředu pro nav po týdnech
    const result = [];

    for (const ev of parsedEvents) {
      if (!ev.rrule) {
        // Single event
        if (ev.startDate && ev.startDate >= today && ev.startDate <= horizon) {
          result.push(ev);
        }
        continue;
      }

      // Recurring - rozgeneruj výskyty
      const freq = ev.rrule.FREQ;
      if (freq !== 'DAILY' && freq !== 'WEEKLY') {
        // Pro MONTHLY/YEARLY zatím jen první výskyt
        if (ev.startDate && ev.startDate >= today && ev.startDate <= horizon) {
          result.push(ev);
        }
        continue;
      }

      // BYDAY (jen pro WEEKLY): MO,TU,WE,TH,FR,SA,SU
      const dayMap = { MO:1, TU:2, WE:3, TH:4, FR:5, SA:6, SU:0 };
      const byday = ev.rrule.BYDAY ? ev.rrule.BYDAY.split(',').map(d => dayMap[d]) : null;

      // UNTIL boundary
      let until = horizon;
      if (ev.rrule.UNTIL) {
        const u = ev.rrule.UNTIL;
        if (u.length >= 8) {
          const ud = new Date(parseInt(u.slice(0,4)), parseInt(u.slice(4,6))-1, parseInt(u.slice(6,8)));
          if (ud < until) until = ud;
        }
      }

      const interval = parseInt(ev.rrule.INTERVAL) || 1;
      const startDate = ev.startDate;
      if (!startDate) continue;

      // Generuj výskyty od today (nebo startDate, podle toho co je pozdější) do until
      const generateFrom = startDate < today ? today : startDate;
      const cursor = new Date(generateFrom);
      cursor.setHours(startDate.getHours(), startDate.getMinutes(), 0, 0);

      let count = 0;
      const maxCount = 200; // safety

      while (cursor <= until && count < maxCount) {
        let include = false;

        if (freq === 'DAILY') {
          // Zahrň každý den (interval-tý)
          const daysSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24));
          if (daysSinceStart >= 0 && daysSinceStart % interval === 0) include = true;
        } else if (freq === 'WEEKLY') {
          if (byday) {
            if (byday.indexOf(cursor.getDay()) >= 0) {
              const weeksSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24*7));
              if (weeksSinceStart >= 0 && weeksSinceStart % interval === 0) include = true;
            }
          } else {
            // Bez BYDAY = stejný den v týdnu jako startDate
            if (cursor.getDay() === startDate.getDay()) {
              const weeksSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24*7));
              if (weeksSinceStart >= 0 && weeksSinceStart % interval === 0) include = true;
            }
          }
        }

        if (include) {
          const y = cursor.getFullYear();
          const m = pad2(cursor.getMonth()+1);
          const d = pad2(cursor.getDate());
          const dateKey = `${y}${m}${d}`;
          // Skip pokud je tento výskyt v EXDATE
          if (ev.exdates.indexOf(dateKey) < 0) {
            result.push({
              ...ev,
              iso: `${y}-${m}-${d}`,
              dateTime: `${y}-${m}-${d}T${ev.time || '00:00'}:00`,
            });
            count++;
          }
        }

        cursor.setDate(cursor.getDate() + 1);
      }
    }

    return result.sort((a, b) => (a.dateTime || a.iso).localeCompare(b.dateTime || b.iso));
  }, []);

  useEffect(() => {
    if (!effectiveHueWebhookUrl || !effectiveHueWebhookUrl.trim()) return;
    const url = effectiveHueWebhookUrl.trim();
    let cancelled = false;
    const tick = async () => {
      if (cancelled) return;
      try {
        const since = hueLastTsRef.current || '';
        const sep = url.includes('?') ? '&' : '?';
        const res = await fetch(url + sep + 'action=events&since=' + encodeURIComponent(since));
        if (!res.ok) return;
        const events = await res.json();
        if (!Array.isArray(events) || events.length === 0) return;
        const ordered = [...events].sort((a,b) => (a.ts || '').localeCompare(b.ts || ''));
        let latestTs = hueLastTsRef.current;
        for (const ev of ordered) {
          if (!ev || !ev.key || !ev.ts) continue;
          if (hueLastTsRef.current && ev.ts <= hueLastTsRef.current) continue;
          const btn = hueButtonsRef.current.find(b => b.key === ev.key);
          if (btn && btn.action) {
            triggerHueActionRef.current(btn.action, btn.label || ev.key);
          }
          setHueEvents(prev => [{ ts: ev.ts, key: ev.key, label: btn ? (btn.label || btn.key) : '(nepřiřazeno)' }, ...prev].slice(0, 10));
          if (!latestTs || ev.ts > latestTs) latestTs = ev.ts;
        }
        if (latestTs) hueLastTsRef.current = latestTs;
        setHueLastError(null);
      } catch (e) {
        // tichá chyba
      }
    };

      if (hueLastTsRef.current) return; // už jsme byli inicializováni

        const res = await fetch(url + sep + 'action=events');

        if (Array.isArray(events) && events.length > 0) {

        } else {
          hueLastTsRef.current = new Date().toISOString();
        }
        setHueLastError('Připojeno · poslouchám stisky');
      } catch (e) {
        setHueLastError('Chyba spojení: ' + e.message);
      }
    };
    init();
    const id = setInterval(tick, 3000);
    return () => { cancelled = true; clearInterval(id); };

    if (s.eveningStreakLast === null || isStr(s.eveningStreakLast)) setEveningStreakLast(s.eveningStreakLast);
    if (isObj(s.moodLog)) setMoodLog(s.moodLog);
    if (s.lastMoodDate === null || isStr(s.lastMoodDate)) setLastMoodDate(s.lastMoodDate);
    if (isStr(s.parentPin) && s.parentPin.length === 4) setParentPin(s.parentPin);
    if (isStr(s.childName)) setChildName(s.childName);
    if (isArr(s.weekEvents) && s.weekEvents.length === 7) setWeekEvents(s.weekEvents);
    if (isArr(s.worryMessages)) setWorryMessages(s.worryMessages);
    if (isArr(s.readingList)) setReadingList(s.readingList);
    if (isArr(s.stickers)) setStickers(s.stickers);
    if (s.childPhoto === null || isStr(s.childPhoto)) setChildPhoto(s.childPhoto);
    if (isArr(s.choresList)) setChoresList(s.choresList);
    if (isArr(s.weeklyChores)) setWeeklyChores(s.weeklyChores);
    if (isNum(s.petMood)) setPetMood(s.petMood);
    if (isNum(s.petEnergy)) setPetEnergy(s.petEnergy);
    if (isBool(s.petSleeping)) setPetSleeping(s.petSleeping);
    if (isNum(s.petLastDecay)) setPetLastDecay(s.petLastDecay);
    if (isArr(s.inventory)) setInventory(s.inventory);
    if (isObj(s.bossState)) setBossState(s.bossState);
    if (isStr(s.lastDayKey)) setLastDayKey(s.lastDayKey);
    if (Array.isArray(s.routineHistory)) setRoutineHistory(s.routineHistory);
    if (isStr(s.gcalUrl)) setGcalUrl(s.gcalUrl);
    if (isArr(s.gcalEvents)) setGcalEvents(s.gcalEvents);
    if (isNum(s.gcalLastFetch)) setGcalLastFetch(s.gcalLastFetch);
    if (isArr(s.whoHomeSchedule) && s.whoHomeSchedule.length === 7) setWhoHomeSchedule(s.whoHomeSchedule);
    if (isObj(s.voiceMap)) setVoiceMap(s.voiceMap);
    if (isStr(s.voiceBaseUrl)) setVoiceBaseUrl(s.voiceBaseUrl);
    if (isArr(s.dayBlueprintByDay) && s.dayBlueprintByDay.length === 7) setDayBlueprintByDay(s.dayBlueprintByDay);
    if (isStr(s.hueWebhookUrl)) setHueWebhookUrl(s.hueWebhookUrl);
    if (isArr(s.hueButtons)) setHueButtons(s.hueButtons);
  }, []);

  // PULL ze serveru (manuální nebo periodicky)
  const pullFromServer = useCallback(async (silent) => {
    if (!syncUrl) return;
    if (!silent) setSyncStatus('syncing');
    try {
      const r = await fetch(syncUrl, {
        method: 'POST',
        // Content-Type text/plain aby se vyhnulo CORS preflight (Apps Script vzor)
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'pull' }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'pull failed');
      if (j.state) {
        const remoteState = typeof j.state === 'string' ? JSON.parse(j.state) : j.state;
        // Pouze přijmi pokud je server novější než to co jsem naposled pushnul
        if (!lastPushedStateRef.current || j.updated !== lastPushedStateRef.current) {
          applySnapshot(remoteState);
          lastPushedStateRef.current = j.updated;
        }
      }
      setLastSyncTime(j.updated || new Date().toISOString());
      setSyncStatus('ok');
      setSyncError(null);
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
    }
  }, [syncUrl, applySnapshot]);

  // PUSH na server
  const pushToServer = useCallback(async () => {
    if (!syncUrl) return;
    setSyncStatus('syncing');
    try {
      const snap = buildSnapshot();
      const r = await fetch(syncUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'push', state: snap }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'push failed');
      lastPushedStateRef.current = j.updated;
      setLastSyncTime(j.updated);
      setSyncStatus('ok');
      setSyncError(null);
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
    }
  }, [syncUrl, buildSnapshot]);

  // Init pull při prvním načtení nebo změně URL
  useEffect(() => {
    if (!syncUrl) { setSyncStatus('disabled'); initialPullDoneRef.current = false; return; }
    if (initialPullDoneRef.current) return;
    initialPullDoneRef.current = true;
    pullFromServer(false);
    // eslint-disable-next-line
  }, [syncUrl]);

  // Periodický pull každých 30s
  useEffect(() => {
    if (!syncUrl) return;
    const id = setInterval(() => pullFromServer(true), 30000);
    return () => clearInterval(id);
  }, [syncUrl, pullFromServer]);

  // Debounced push při změně stavu (3s po poslední změně)
  useEffect(() => {
    if (!syncUrl || !initialPullDoneRef.current) return;
    const t = setTimeout(() => { pushToServer(); }, 3000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [
    points, totalXp, doneM, doneE, choreState, pendingApprovals,
    shopState, weeklyDone, challenges, packState, packAwarded,
    streakDays, eveningStreakDays, moodLog,
    worryMessages, readingList, stickers,
    morning, evening, shopItems, choresList, weeklyChores,
    weekEvents, rozvrh, buttonConfig,
    mascotName, childName, childPhoto, soundOn, ttsOn,
    bedtime, wakeTime, praiseMessages, parentPin,
    whoHome, departMin,
  ]);

  // Funkce pro testovací sync (z UI)
  const manualSync = useCallback(async () => {
    if (!syncUrl) { showToast('Nejdřív nastav URL', '⚠️'); return; }
    await pushToServer();
    await pullFromServer(false);
    if (syncStatus !== 'error') showToast('Synchronizováno', '✓');
  }, [syncUrl, pushToServer, pullFromServer, showToast, syncStatus]);


  // ukázat mood prompt po dokončení ranní rutiny (jen 1x za den)
  useEffect(() => {
    const list = morning.filter(s => s.on);
    const allDone = list.length > 0 && list.every(s => doneM[s.id]);
    if (allDone && !todayMoodDone && !showMoodPrompt) {
      // krátké zpoždění aby si dítě nejdřív užilo konfety
      const t = setTimeout(() => setShowMoodPrompt(true), 4500);
      return () => clearTimeout(t);
    }
  }, [doneM, morning, todayMoodDone, showMoodPrompt]);

  // Sticker auto-award triggery - kontrola po každé změně stavu
  useEffect(() => {
    const have = new Set(stickers.map(s => s.id));
    const toAward = [];
    // Definice nálepek a podmínek
    const totalPagesRead = readingList.reduce((sum, b) => sum + (b.pagesRead || 0), 0);
    const finishedBooks = readingList.filter(b => b.pagesRead >= b.pagesTotal && b.pagesTotal > 0).length;
    const candidates = [
      { id:'first-routine', emoji:'🌟', name:'První rutina',     cond: totalXp >= 10 },
      { id:'streak-7',      emoji:'🔥', name:'Týden v řadě',    cond: streakDays >= 7 },
      { id:'streak-14',     emoji:'💪', name:'Dva týdny',         cond: streakDays >= 14 },
      { id:'streak-30',     emoji:'🏆', name:'Měsíc hrdina',     cond: streakDays >= 30 },
      { id:'points-100',    emoji:'💎', name:'100 bodů',          cond: totalXp >= 100 },
      { id:'points-500',    emoji:'👑', name:'500 bodů',          cond: totalXp >= 500 },
      { id:'reader-50',     emoji:'📖', name:'50 stránek',        cond: totalPagesRead >= 50 },
      { id:'reader-200',    emoji:'📚', name:'200 stránek',       cond: totalPagesRead >= 200 },
      { id:'book-finished', emoji:'🎓', name:'Dočetl knihu',    cond: finishedBooks >= 1 },
      { id:'helper-5',      emoji:'🧹', name:'5x pomohl',         cond: pendingApprovals.length === 0 && choreState && Object.keys(choreState).filter(k => choreState[k] === 'done').length >= 5 },
    ];
    candidates.forEach(c => {
      if (c.cond && !have.has(c.id)) {
        toAward.push({ id: c.id, emoji: c.emoji, name: c.name, date: new Date().toISOString() });
      }
    });
    if (toAward.length > 0) {
      setStickers(s => [...s, ...toAward]);
      toAward.forEach(s => {
        setTimeout(() => showToast(`Nová nálepka: ${s.name}`, s.emoji), 600);
      });
      audio.success();
      confetti.fire({ n: 80 });
      if (playVoiceRef.current) playVoiceRef.current('stickerNew', 'Nová nálepka!');
    }
    // eslint-disable-next-line
  }, [totalXp, streakDays, readingList, choreState]);

  // greeting jednou při vstupu (pokud audio už odemknuté user gestem)
  const greetedRef = useRef(false);
  useEffect(() => {
    if (entered && !greetedRef.current && ttsOn) {
      greetedRef.current = true;
      setTimeout(() => {
        // v27: skip auto-pozdravu pokud user ještě nic neklepnul (autoplay blokovaný)
        if (!audioUnlockedRef.current) return;
        const h = new Date().getHours();
        const evt = h < 10 ? 'morning' : (h >= 18 ? 'evening' : 'hello');
        if (sayRikiVoiceRef.current) sayRikiVoiceRef.current(evt, RIKI_PHRASES.hello);
      }, 800);
    }
  }, [entered, ttsOn, tts]);

  // v10: ?sync=... URL param automaticky nastaví Apps Script URL (pro sdílení mezi zařízeními)
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const syncParam = params.get('sync');
      if (syncParam && syncParam.startsWith('http') && syncParam !== syncUrl) {
        setSyncUrl(syncParam);
        showToast('Synchronizace nastavena 🔄', '✓');
        // Vyčistit URL aby se znovu nenastavila
        try {
          const url = new URL(window.location.href);
          url.searchParams.delete('sync');
          window.history.replaceState(null, '', url.toString());
        } catch(e) {}
      }
    } catch(e) {}
    // eslint-disable-next-line
  }, []);

  // Hue URL trigger: ?do=wc spustí akci. Apple Home Shortcut otevře tuhle URL po stisku tlačítka.
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const doKey = params.get('do');
      if (!doKey) return;
      const t = TASK_CATALOG.find(x => x.key === doKey);
      if (!t || t.key === 'none') return;
      // krátké zpoždění aby se appka stihla namountovat
      const tm = setTimeout(() => {
        triggerTask(t);
        showToast(`Hue: ${t.label}`, t.emoji);
        // vyčistit URL aby reload neaktivoval znovu
        try {
          const clean = window.location.origin + window.location.pathname;
          window.history.replaceState(null, '', clean);
        } catch(e) {}
      }, 800);
      return () => clearTimeout(tm);
    } catch(e) {}
    // eslint-disable-next-line
  }, [entered]);

  // proaktivní cache (bez SW - jednoduchý warmup pro offline použití)
  // Pro plný offline-first režim přidej sw.js vedle index.html (viz README)
  useEffect(() => {
    if (!('caches' in window)) return;
    try {
      const urls = [
        location.href,
        'https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap',
        'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone@7.24.7/babel.min.js'
      ];
      caches.open('dp-v3-warm').then(c => {
        urls.forEach(u => { c.add(u).catch(() => {}); });
      }).catch(() => {});
    } catch(e) {}
  }, []);

  // ====================================================================
  // RENDER
  // ====================================================================
  return (
    <div style={rootStyle}>
      <div ref={confetti.ref} style={{ position:'absolute', inset:0, pointerEvents:'none', zIndex:90, overflow:'hidden' }}/>

      {/* v14: Floating XP čísla */}
      <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:95, overflow:'hidden' }}>
        {floatingXp.map(f => (
          <div key={f.id} style={{
            position:'absolute',
            left: f.x,
            top: f.y,
            transform:'translate(-50%, 0)',
            fontFamily:'var(--display)',
            fontSize: f.critical ? 42 : 32,
            fontWeight: 800,
            color: f.critical ? '#f59e0b' : '#16a34a',
            textShadow: f.critical
              ? '0 0 12px rgba(245,158,11,.8), 0 3px 0 #fff, 0 3px 18px rgba(0,0,0,.4)'
              : '0 0 8px rgba(22,163,74,.6), 0 2px 0 #fff, 0 2px 12px rgba(0,0,0,.3)',
            animation:'floatUp 1.4s ease-out forwards',
            whiteSpace:'nowrap'
          }}>
            {f.critical && '⭐ '}{f.value}{f.critical && ' ⭐'}
          </div>
        ))}
      </div>

      {/* Na mobilu zobrazujeme jen rodičovský overlay; kid screeny jsou pro tablet. */}
      {!isMobile && (
      <React.Fragment>

      {/* ===================== TABLET: HOME ===================== */}
      {screen === 'home' && (
      <div data-screen-label="Tablet — Domů" style={{ position:'absolute', inset:0, padding:'20px 24px', display:'flex', flexDirection:'column', gap:14, overflowY:'auto', overflowX:'hidden', zoom: 0.85 }}>

        {/* top bar */}
        <div style={{ display:'flex', alignItems:'center', gap:18, animation: ent(0) }}>
          {childPhoto && (
            <div style={{ width:64, height:64, borderRadius:'50%', background: `url(${childPhoto}) center/cover`, border:'3px solid #fff', boxShadow:'var(--shadow)', flex:'none' }}/>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:17, fontWeight:800, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--muted)' }}>{dateLine}</div>
            <div style={{ fontFamily:'var(--display)', fontSize:42, fontWeight:600, lineHeight:1.05, color:'var(--ink)', marginTop:2 }}>{greeting}</div>
          </div>
          {syncUrl && (
            <div title={`Sync: ${syncStatus}`} style={{ width:10, height:10, borderRadius:'50%', background:
              syncStatus === 'ok' ? '#16a34a' :
              syncStatus === 'syncing' ? '#f59e0b' :
              syncStatus === 'error' ? '#dc2626' : '#9ca3af',
              boxShadow: syncStatus === 'ok' ? '0 0 8px rgba(22,163,74,.5)' : 'none', flex:'none' }}/>
          )}
          <div onClick={() => { audio.tap(); setShowWorryBox(true); }} style={{ cursor:'pointer', width:54, height:54, borderRadius:18, background:'var(--surface)', border:'var(--hair)', boxShadow:'var(--shadow)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 }} title="Něco mě trápí">💬</div>
          <div onClick={() => go('tlacitka')} style={{ cursor:'pointer', width:54, height:54, borderRadius:18, background:'var(--surface)', border:'var(--hair)', boxShadow:'var(--shadow)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 }} title="Chytrá tlačítka">🔘</div>
          <div onClick={openParent} style={{ cursor:'pointer', width:54, height:54, borderRadius:18, background:'var(--surface)', border:'var(--hair)', boxShadow:'var(--shadow)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, position:'relative' }} title="Rodičovský režim">
            🔒
            {(pendingApprovals.length + worryMessages.filter(m => !m.read).length) > 0 && (
              <div style={{ position:'absolute', top:-4, right:-4, background:'#dc2626', color:'#fff', fontSize:12, fontWeight:900, borderRadius:11, minWidth:22, height:22, lineHeight:'22px', padding:'0 6px', boxShadow:'0 2px 6px rgba(0,0,0,.25)', border:'2px solid #fff' }}>
                {pendingApprovals.length + worryMessages.filter(m => !m.read).length}
              </div>
            )}
          </div>
        </div>

        {/* v17+v23: A — barevný pruh dne, B — TEACCH pictogram timeline (full width) */}
        {(() => {
          const nowD = new Date();
          const totalMins = nowD.getHours() * 60 + nowD.getMinutes();
          const dayProgress = totalMins / (24 * 60);
          const h = nowD.getHours();
          let phase, phaseColor, phaseEmoji;
          if (h < 6)       { phase = 'NOC';       phaseColor = '#1e1b4b'; phaseEmoji = '🌙'; }
          else if (h < 9)  { phase = 'RÁNO';      phaseColor = '#fb923c'; phaseEmoji = '🌅'; }
          else if (h < 12) { phase = 'DOPOLEDNE'; phaseColor = '#facc15'; phaseEmoji = '☀️'; }
          else if (h < 14) { phase = 'OBĚD';      phaseColor = '#dc2626'; phaseEmoji = '🍽️'; }
          else if (h < 18) { phase = 'ODPOLEDNE'; phaseColor = '#16a34a'; phaseEmoji = '🌳'; }
          else if (h < 21) { phase = 'VEČER';     phaseColor = '#7c3aed'; phaseEmoji = '🌆'; }
          else             { phase = 'NOC';       phaseColor = '#1e3a8a'; phaseEmoji = '🌙'; }

          const todaysBp = (dayBlueprintByDay && dayBlueprintByDay[todayDayIdx]) || DAY_BLUEPRINT;
          const blueprintMins = todaysBp.map(b => ({ ...b, mins: (function(){ const p = String(b.time||'0:0').split(':'); return parseInt(p[0])*60+parseInt(p[1]); })() }));
          let currentIdx = -1;
          for (let i = blueprintMins.length - 1; i >= 0; i--) {
            if (blueprintMins[i].mins <= totalMins) { currentIdx = i; break; }
          }
          const upcoming = blueprintMins.find(b => b.mins > totalMins);
          const remainingMins = upcoming ? Math.max(0, upcoming.mins - totalMins) : 0;
          const remH = Math.floor(remainingMins / 60);
          const remM = remainingMins % 60;
          const prevMs = currentIdx >= 0 ? blueprintMins[currentIdx].mins : 0;
          const nextMs = upcoming ? upcoming.mins : 24*60;
          const phasePct = nextMs > prevMs ? Math.min(1, Math.max(0, (totalMins - prevMs) / (nextMs - prevMs))) : 0;

          // v23: detekce špatného víkendového rozvrhu
          const isWeekendToday = todayDayIdx >= 5;
          const hasSchoolMilestone = blueprintMins.some(b => /škol/i.test(b.label || ''));
          const weekendNeedsFix = isWeekendToday && hasSchoolMilestone;

          return (
            <div style={{ display:'flex', flexDirection:'column', gap:10, animation: ent(0.5) }}>
              {/* Weekend fix banner */}
              {weekendNeedsFix && (
                <div style={{ background:'linear-gradient(135deg, #fef3c7, #fde68a)', border:'2px solid #f59e0b', borderRadius:14, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                  <span style={{ fontSize:24 }}>🎉</span>
                  <div style={{ flex:1, fontSize:13, fontWeight:700, color:'#92400e', lineHeight:1.4 }}>
                    Dnes je víkend, ale rozvrh obsahuje školu. Mám použít víkendový rozvrh?
                  </div>
                  <div onClick={() => {
                    if (!window.confirm('Přepíše dnešní den víkendovým rozvrhem (vstávat 8:00, snídaně, hraní, oběd, ...). Pokračovat?')) return;
                    audio.tap();
                    const def = WEEKEND_BLUEPRINT.map(b => ({...b, id: b.id + '-' + (todayDayIdx === 5 ? 'sa' : 'su')}));
                    setDayBlueprintByDay(all => all.map((day, i) => i === todayDayIdx ? def : day));
                  }} style={{ cursor:'pointer', background:'#f59e0b', color:'#fff', borderRadius:10, padding:'8px 14px', fontWeight:800, fontSize:13, whiteSpace:'nowrap', boxShadow:'0 4px 12px rgba(245,158,11,.3)' }}>✓ Použít víkend</div>
                  <div onClick={() => {
                    audio.tap();
                    // V tichosti zruš - mark this day as "kept by user" by adding a flag? Pro teď jen close.
                  }} title="Zavřít" style={{ cursor:'pointer', width:28, height:28, borderRadius:8, color:'#92400e', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900 }}>✕</div>
                </div>
              )}

              {/* A — barevný pruh + integrovaný phase badge + countdown v JEDNOM ROW */}
              <div style={{ display:'grid', gridTemplateColumns: upcoming ? '1fr auto' : '1fr', gap:14, alignItems:'center' }}>
                <div style={{ position:'relative' }}>
                  <div style={{ position:'relative', height: 36, borderRadius: 18, background: 'linear-gradient(90deg, #1e1b4b 0%, #1e1b4b 25%, #fb923c 25%, #fb923c 37.5%, #facc15 37.5%, #facc15 50%, #dc2626 50%, #dc2626 58.3%, #16a34a 58.3%, #16a34a 75%, #7c3aed 75%, #7c3aed 87.5%, #1e3a8a 87.5%)', overflow:'visible', boxShadow:'0 4px 14px rgba(0,0,0,.18)', border:'2px solid #fff' }}>
                    {/* Slunce/měsíc */}
                    <div style={{
                      position:'absolute',
                      left: 'calc(' + (dayProgress * 100) + '% - 22px)',
                      top: '50%',
                      transform: 'translateY(-50%)',
                      width: 48, height: 48,
                      borderRadius: '50%',
                      background: '#fff',
                      boxShadow: '0 0 22px rgba(255,200,0,.85), 0 4px 12px rgba(0,0,0,.25)',
                      display:'flex',
                      alignItems:'center',
                      justifyContent:'center',
                      fontSize: 26,
                      border: '3px solid '+phaseColor,
                      zIndex: 2,
                      transition: 'left 1s linear'
                    }}>
                      {phaseEmoji}
                    </div>
                    {/* Phase badge překryje pruh vlevo */}
                    <div style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', background:'rgba(0,0,0,.45)', color:'#fff', borderRadius:12, padding:'4px 10px', fontWeight:800, fontSize:13, letterSpacing:'.06em', zIndex:1, backdropFilter:'blur(4px)' }}>
                      {phase}
                    </div>
                  </div>
                  {/* Hodinové značky */}
                  <div style={{ position:'relative', height:14, marginTop:4 }}>
                    {[0,6,12,18,24].map(hh => (
                      <div key={hh} style={{ position:'absolute', left: ((hh/24)*100) + '%', transform:'translateX(-50%)', fontSize:10, fontWeight:800, color:'var(--muted)' }}>
                        {hh < 10 ? '0'+hh+':00' : hh+':00'}
                      </div>
                    ))}
                  </div>
                </div>
                {/* Countdown jako tiskněnka vpravo */}
                {upcoming && (
                  <div style={{ display:'flex', alignItems:'center', gap:12, background:'#fff', borderRadius:14, padding:'10px 16px', boxShadow:'0 4px 14px rgba(0,0,0,.08)', border:'var(--hair)' }}>
                    <span style={{ fontSize:30, lineHeight:1 }}>{upcoming.emoji}</span>
                    <div>
                      <div style={{ fontSize:10, fontWeight:800, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>Do "{upcoming.label}"</div>
                      <div style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:600, color: remainingMins < 30 ? '#dc2626' : remainingMins < 60 ? '#f59e0b' : '#16a34a' }}>
                        {remH > 0 ? remH + 'h ' : ''}{remM}min
                      </div>
                    </div>

              {/* v8: Vizuální časovač - kruhový progress + ikona s změnou barvy */}
              {(() => {
                const expected = routine.current.secs || 180;
                const started = currentStepStart || nowTick;
                const elapsed = (nowTick - started) / 1000;
                const pct = Math.min(1, elapsed / expected);
                const overtime = elapsed > expected;
                const remaining = Math.max(0, expected - elapsed);
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                // Barva: zelená (<60%), žlutá (60-90%), oranžová (90-100%), červená (>100%)
                const ringColor = pct < 0.6 ? '#16a34a' : pct < 0.9 ? '#f59e0b' : pct < 1 ? '#fb923c' : '#dc2626';
                const sandEmoji = pct < 0.5 ? '🟢' : pct < 0.85 ? '⏳' : '⏰';
                // SVG kruh s progress
                const R = 138, C = 2 * Math.PI * R;
                const dash = C * (1 - pct);
                return (
                  <div style={{ position:'relative', width:300, height:300 }}>
                    {/* Kruhový progress (SVG) */}
                    <svg width="300" height="300" style={{ position:'absolute', inset:0, transform:'rotate(-90deg)' }}>

                      <circle cx="150" cy="150" r={R} stroke={ringColor} strokeWidth="14" fill="none"
                        strokeLinecap="round"
                        strokeDasharray={C}
                        strokeDashoffset={dash}
                        style={{ transition:'stroke-dashoffset .8s ease, stroke .4s' }} />
                    </svg>
                    {/* Vnitřek - emoji + zbývající čas */}

                        <span style={{ fontSize:22 }}>{sandEmoji}</span>
                        <span style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:600, color: ringColor }}>

                          {overtime && '⚠'}
                        </span>
                      </div>
                    </div>
                  </div>
                );
              })()}

                    </label>
                    <div style={{ fontSize:13, fontWeight:700, color:'#5a566e', marginBottom:6 }}>Do kdy spát (probuzení) — klepni a vyber čas</div>
                    <label style={{ display:'block', background:'#fef3c7', border:'2px solid #f59e0b', borderRadius:14, padding:'14px 16px', cursor:'pointer' }}>

                      <input type="time" value={wakeTime} onChange={(e) => setWakeTime(e.target.value)} style={{ width:'100%', border:'none', background:'transparent', fontSize:22, fontWeight:700, color:'#92400e', fontFamily:'var(--display)', outline:'none', padding:0, cursor:'pointer' }} />
                    </label>
                    <div style={{ fontSize:12, color:'#9a96ac', marginTop:10, lineHeight:1.4 }}>V tomto okně se obrazovka ztmaví a {mascotName} spí.</div>
                  </div>
                  </>)}

                  {settingsSubTab === 'sync' && (<>
                  {/* v7: Synchronizace */}
                  <div style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 4px 16px rgba(20,16,40,.06)' }}>
                    <div style={{ fontFamily:'var(--display)', fontSize:18, fontWeight:600, color:'#1a1530', marginBottom:10, display:'flex', alignItems:'center', gap:8 }}>
                      Synchronizace 🔄
                      {syncUrl && (
                        <div style={{ width:10, height:10, borderRadius:'50%', background:
                          syncStatus === 'ok' ? '#16a34a' :
                          syncStatus === 'syncing' ? '#f59e0b' :
                          syncStatus === 'error' ? '#dc2626' : '#9ca3af' }}/>
                      )}
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:'#5a566e', lineHeight:1.5, marginBottom:10 }}>
                      Tablet dítěte a tvůj mobil sdílí stav. Pending úkoly, rutiny, body — vše se synchronizuje přes tvůj soukromý Google Sheet.
                    </div>
                    <div style={{ fontSize:13, fontWeight:700, color:'#5a566e', marginBottom:6 }}>Apps Script URL</div>

                            syncStatus === 'error' ? '#dc2626' : '#9ca3af' }}>

                          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'4px 0' }}>

                        </div>

                        <div style={{ background:'#eef4ff', borderRadius:12, padding:'12px 14px', marginTop:14 }}>
                          <div style={{ fontSize:13, fontWeight:800, color:'var(--accent)', marginBottom:6 }}>📱 Nastavit sync na druhém zařízení</div>

                            const shareUrl = base + '?sync=' + encodeURIComponent(syncUrl);
                            return (
                              <div onClick={() => {

                                {shareUrl}

                              </div>
                            );

                            return (
                              <div style={{ marginTop:10, textAlign:'center' }}>
                                <div style={{ fontSize:11, fontWeight:800, color:'#5a566e', marginBottom:4 }}>Nebo naskenuj QR mobilem:</div>

                              </div>
                            );
                          })()}
                        </div>
                      </div>
                    )}

                    {!syncUrl && (
                      <div style={{ background:'#fef9c3', borderRadius:10, padding:'10px 12px', fontSize:12, color:'#854d0e', marginTop:10, lineHeight:1.5 }}>
                        <b>Jak na to:</b><br/>
                        1. Stáhni si soubor <code style={{ fontFamily:'monospace' }}>apps-script.gs</code> z repa<br/>
                        2. Vytvoř nový Google Sheet → Rozšíření → Apps Script<br/>
                        3. Vlož kód, nahraď SHEET_ID za své ID<br/>
                        4. Nasaď jako Web App (Anyone)<br/>
                        5. Sem vlož URL končící <code>/exec</code><br/>
                        <br/>
                        Detailní návod v komentářích souboru.
                      </div>
                    )}
                  </div>

                  <div style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 4px 16px rgba(20,16,40,.06)' }}>
                    <div style={{ fontFamily:'var(--display)', fontSize:18, fontWeight:600, color:'#1a1530', marginBottom:10 }}>Data 💾</div>
                    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                      <div onClick={exportData} style={{ cursor:'pointer', background:'#eef4ff', color:'var(--accent)', borderRadius:12, padding:'12px 14px', fontWeight:800, fontSize:14, textAlign:'center' }}>⬇️ Stáhnout zálohu (JSON)</div>
                      <label style={{ cursor:'pointer', background:'#fef3c7', color:'#92400e', borderRadius:12, padding:'12px 14px', fontWeight:800, fontSize:14, textAlign:'center', display:'block' }}>
                        ⬆️ Načíst ze zálohy
                        <input type="file" accept=".json,application/json" onChange={importData} style={{ display:'none' }} />
                      </label>
                      <div onClick={resetAllData} style={{ cursor:'pointer', background:'#fee2e2', color:'#991b1b', borderRadius:12, padding:'12px 14px', fontWeight:800, fontSize:14, textAlign:'center' }}>🗑️ Smazat všechna data</div>
                    </div>
                  </div>
                  </>)}

                  {/* Verze (vždy zobrazeno) */}
                  <div style={{ background:'#fff', borderRadius:20, padding:16, boxShadow:'0 4px 16px rgba(20,16,40,.06)' }}>
                    <div style={{ fontFamily:'var(--display)', fontSize:14, fontWeight:600, color:'#1a1530' }}>Verze: Domácí pomocník v42</div>
                    <div style={{ fontSize:12, color:'#9a96ac', marginTop:4 }}>Build 2026-06-21 · 18:31</div>
                  </div>
                </div>
                )}
              </div>

              {/* bottom nav - na mobilu jako grid 3x3 (všechny taby viditelné), na desktop horizontální */}
              <div style={{
                display: isMobile ? 'grid' : 'flex',
                gridTemplateColumns: isMobile ? 'repeat(3, 1fr)' : 'none',
                background:'#fff',
                borderTop:'1px solid #ececf2',
                padding: isMobile ? '8px 6px 16px' : '9px 6px 14px',
                gap: isMobile ? 2 : 0,
                overflowX: isMobile ? 'visible' : 'auto',
                WebkitOverflowScrolling:'touch'
              }}>
                {parentTabsR.map((t) => {
                  const showBadge = (t.id === 'body' && pendingList.length > 0);
                  const active = parentTab === t.id;
                  return (
                    <div key={t.id} onClick={() => { audio.tap(); setParentTab(t.id); }} style={{
                      cursor:'pointer',
                      flex: isMobile ? 'none' : '0 0 auto',
                      minWidth: isMobile ? 'auto' : 64,
                      textAlign:'center',
                      padding: isMobile ? '8px 4px' : '5px 4px',
                      position:'relative',
                      background: isMobile && active ? hexA(accent, 0.08) : 'transparent',
                      borderRadius: isMobile ? 10 : 0
                    }}>
                      <div style={{ fontSize: isMobile ? 24 : 21, opacity: t.op, position:'relative', display:'inline-block' }}>
                        {t.icon}
                        {showBadge && (
                          <div style={{ position:'absolute', top:-4, right:-10, background:'#dc2626', color:'#fff', fontSize:10, fontWeight:900, borderRadius:8, minWidth:16, height:16, lineHeight:'16px', padding:'0 4px', boxShadow:'0 2px 4px rgba(0,0,0,.2)' }}>{pendingList.length}</div>
                        )}
                      </div>
                      <div style={{ fontSize: isMobile ? 12 : 11, fontWeight:800, color: t.ink, marginTop:3, whiteSpace:'nowrap' }}>{t.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            )}
        </div>
      </div>
      )}
      {toast && (
      <div style={{ position:'absolute', top:26, left:'50%', transform:'translateX(-50%)', zIndex:95, background:'#16a34a', color:'#fff', fontFamily:'var(--display)', fontSize:20, fontWeight:600, padding:'14px 26px', borderRadius:18, boxShadow:'0 16px 40px -10px rgba(0,0,0,.4)', animation:'toastIn .35s ease', display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ fontSize:24 }}>{toast.icon}</span>{toast.msg}
      </div>
      )}

      {/* v2: Praise message popup (vzkaz od rodiče) */}
      {praiseShown && !parentOpen && (
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', zIndex:75, background:'linear-gradient(135deg, #ff80ab, #ff5d8f)', color:'#fff', padding:'28px 36px', borderRadius:24, boxShadow:'0 24px 60px -10px rgba(255,93,143,.55)', animation:'popIn .55s ease', maxWidth:560, textAlign:'center' }}>
          <div style={{ fontSize:42, marginBottom:8 }}>💌</div>
          <div style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:700, lineHeight:1.3 }}>{praiseShown}</div>
          <div style={{ fontSize:13, fontWeight:700, opacity:.85, marginTop:14, textTransform:'uppercase', letterSpacing:'.1em' }}>od mámy</div>
        </div>
      )}

      {/* v15: Mood prompt - posuvník 0-100 */}
      {showMoodPrompt && !parentOpen && !isMobile && (
        <div style={{ position:'absolute', inset:0, zIndex:78, background:'rgba(10,8,30,.55)', display:'flex', alignItems:'center', justifyContent:'center', backdropFilter:'blur(6px)' }}>
          <div style={{ background:'var(--surface)', borderRadius:28, padding:'34px 38px', maxWidth:680, width:'92%', boxShadow:'var(--shadow)', animation:'popIn .4s ease' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'start', marginBottom:18 }}>
              <div>
                <div style={{ fontFamily:'var(--display)', fontSize:26, fontWeight:700, color:'var(--ink)' }}>Jak ti dneska je?</div>
                <div style={{ fontSize:14, color:'var(--muted)', fontWeight:700, marginTop:4 }}>Posuň čudlík tam, kde je to tak akorát.</div>
              </div>
              <div onClick={() => { setShowMoodPrompt(false); setLastMoodDate(todayISO()); }} style={{ cursor:'pointer', fontSize:24, color:'var(--muted)', padding:8 }}>✕</div>
            </div>
            {(() => {
              const v = moodSliderValue;
              const emoji = v < 20 ? '😭' : v < 40 ? '😢' : v < 60 ? '😐' : v < 80 ? '🙂' : '😄';
              const label = v < 20 ? 'hodně špatně' : v < 40 ? 'mizerně' : v < 60 ? 'tak napůl' : v < 80 ? 'fajn' : 'SUPER!';
              const color = v < 20 ? '#dc2626' : v < 40 ? '#ea580c' : v < 60 ? '#f59e0b' : v < 80 ? '#84cc16' : '#16a34a';
              return (
                <div>
                  <div style={{ textAlign:'center', marginBottom:16 }}>
                    <div style={{ fontSize:110, lineHeight:1, transition:'transform .25s', transform:'scale(' + (0.85 + v/250) + ')' }}>{emoji}</div>
                    <div style={{ fontFamily:'var(--display)', fontSize:24, fontWeight:600, color: color, marginTop:6, textTransform:'uppercase', letterSpacing:'.05em' }}>{label}</div>
                  </div>
                  {/* Slider */}
                  <div style={{ padding:'0 8px', marginBottom:8 }}>
                    <input
                      type="range"
                      min="0"
                      max="100"
                      step="1"
                      value={v}
                      onChange={(e) => setMoodSliderValue(parseInt(e.target.value))}
                      style={{
                        width:'100%',
                        height: 14,
                        WebkitAppearance:'none',
                        appearance:'none',
                        background: `linear-gradient(90deg, #dc2626 0%, #ea580c 25%, #f59e0b 50%, #84cc16 75%, #16a34a 100%)`,
                        borderRadius: 10,
                        outline:'none',
                        cursor:'pointer'
                      }}
                    />
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, fontWeight:800, color:'var(--muted)', padding:'0 4px' }}>
                    <span>😭 hodně špatně</span>
                    <span>😐 tak napůl</span>
                    <span>SUPER 😄</span>
                  </div>
                  {/* Potvrď */}
                  <div onClick={() => logMood(v)} style={{ cursor:'pointer', marginTop:22, background:'linear-gradient(135deg, var(--accent), var(--accent2))', color:'#fff', fontFamily:'var(--display)', fontSize:18, fontWeight:600, textAlign:'center', padding:'14px 16px', borderRadius:16, boxShadow:'0 6px 20px rgba(47,107,255,.35)' }}>
                    Hotovo ✓
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* v2: Noční režim overlay */}
      {isNightMode && !parentOpen && (
        <div style={{ position:'absolute', inset:0, zIndex:65, background:'linear-gradient(180deg, #0a0820 0%, #1a1140 100%)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#fff', animation:'popIn .8s ease' }}>
          {/* hvězdy */}
          {[...Array(40)].map((_, i) => (
            <div key={i} style={{ position:'absolute', top: (Math.random()*60)+'%', left: (Math.random()*100)+'%', width: (Math.random()*3+1)+'px', height: (Math.random()*3+1)+'px', background:'#fff', borderRadius:'50%', opacity: 0.3+Math.random()*0.7, animation:`blink ${3+Math.random()*4}s infinite` }}/>
          ))}
          <div style={{ position:'absolute', top:30, right:40, fontSize:46 }}>🌙</div>
          <div style={{ transform:'scale(1.4)', marginBottom:30 }}>
            <Mascot size={180} sleeping={true}/>
          </div>
          <div style={{ fontFamily:'var(--display)', fontSize:46, fontWeight:700, textAlign:'center' }}>Dobrou noc</div>
          <div style={{ fontSize:18, fontWeight:700, opacity:.7, marginTop:8, textAlign:'center' }}>{mascotName} už spí. Spinkej krásně.</div>
          <div style={{ marginTop:36, display:'flex', gap:14 }}>
            <div onClick={() => { setParentOpen(true); audio.tap(); }} style={{ cursor:'pointer', background:'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.22)', borderRadius:14, padding:'12px 22px', fontSize:14, fontWeight:800, letterSpacing:'.05em' }}>Rodič</div>
          </div>
        </div>
      )}

    </div>
  );
}

// ====================================================================
// MOUNT
// ====================================================================
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ error, info });
    try { console.error('[ErrorBoundary]', error, info); } catch(e) {}
  }
  reset() {
    try { localStorage.removeItem('dompomocnik_v1'); } catch(e) {}
    window.location.reload();
  }
  render() {
    if (this.state.error) {
      const errStr = String(this.state.error.message || this.state.error);
      const stackStr = (this.state.info && this.state.info.componentStack) || this.state.error.stack || '';
      return (
        <div style={{ padding: '30px 24px', maxWidth: 720, margin: '40px auto', fontFamily: 'system-ui, sans-serif', color: '#1a1530' }}>
          <div style={{ fontSize: 36 }}>⚠️</div>
          <h1 style={{ fontSize: 22, fontWeight: 700, marginTop: 12 }}>Něco se rozbilo</h1>
          <p style={{ fontSize: 15, color: '#5a566e', lineHeight: 1.5 }}>
            Aplikace narazila na chybu při zobrazování. Pošli mi prosím text dole, opravím to.
          </p>
          <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 12, padding: 14, marginTop: 14, fontFamily: 'monospace', fontSize: 12, color: '#991b1b', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
            {errStr}{'\n\n'}{stackStr}
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
            <button onClick={() => window.location.reload()} style={{ flex: 1, background: '#2f6bff', color: '#fff', border: 'none', borderRadius: 12, padding: '12px 16px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>Zkusit znovu</button>
            <button onClick={() => this.reset()} style={{ flex: 1, background: '#fee2e2', color: '#991b1b', border: 'none', borderRadius: 12, padding: '12px 16px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>Reset dat (smaže lokál)</button>
          </div>
          <p style={{ fontSize: 12, color: '#9a96ac', marginTop: 14, lineHeight: 1.5 }}>
            "Reset dat" smaže lokální data v prohlížeči. Pokud máš sync zapnutý, data se po reloadu načtou ze serveru.
          </p>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

</script>
