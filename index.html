function getTier(xp) {
  let cur = HERO_TIERS[0];
  for (var i = 0; i < HERO_TIERS.length; i++) {
    if (xp >= HERO_TIERS[i].min) cur = HERO_TIERS[i];
  }
  return cur;
}
function getNextTier(xp) {
  for (var i = 0; i < HERO_TIERS.length; i++) {
    if (xp < HERO_TIERS[i].min) return HERO_TIERS[i];
  }
  return null;
}

function rollLoot(forceRarity) {
  let pool = LOOT_TABLE;
  if (forceRarity) pool = LOOT_TABLE.filter(l => l.rarity === forceRarity);
  if (pool.length === 0) pool = LOOT_TABLE;
  const total = pool.reduce((s, l) => s + l.weight, 0);
  let r = Math.random() * total;
  for (var i = 0; i < pool.length; i++) {
    r -= pool[i].weight;
    if (r <= 0) return pool[i];
  }
  return pool[0];
}

// Vrátí ISO datum pondělí toho týdne (pro identifikaci týdne)
function getWeekId() {
  const d = new Date();
  const day = (d.getDay() + 6) % 7; // pondělí=0
  d.setDate(d.getDate() - day);
  return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
}
function getBossForWeek(weekId) {
  // Deterministicky vyber bosse pro týden (hash z weekId)
  let hash = 0;
  for (let i = 0; i < weekId.length; i++) hash = (hash * 31 + weekId.charCodeAt(i)) | 0;
  return BOSS_ROSTER[Math.abs(hash) % BOSS_ROSTER.length];
}

// Návrh oblečení podle teploty
// rainProb = 0-1 (jen pokud opravdu prší — práh 60%)
// wind = km/h
function suggestOutfit(tempC, rainProb, wind) {
  if (tempC == null) return null;
  var parts = [];
  if (tempC < -5)       parts.push({ icon:'🧥', t:'zimní bunda' }, { icon:'🧣', t:'šála a čepice' }, { icon:'🧤', t:'rukavice' });
  else if (tempC < 5)   parts.push({ icon:'🧥', t:'zimní bunda' }, { icon:'🧢', t:'čepice' });
  else if (tempC < 12)  parts.push({ icon:'🧥', t:'teplá bunda' });
  else if (tempC < 18)  parts.push({ icon:'🧥', t:'mikina nebo lehká bunda' });
  else if (tempC < 23)  parts.push({ icon:'👕', t:'tričko + mikina v batohu' });
  else                  parts.push({ icon:'👕', t:'tričko a kraťasy' });
  // Deštník jen když je opravdu velká šance že bude pršet (60%+)
  if (rainProb != null && rainProb > 0.6) parts.push({ icon:'☔', t:'pláštěnka nebo deštník' });
  if (wind != null && wind > 35)  parts.push({ icon:'💨', t:'pozor, fouká!' });
  return parts;
}

// ====================================================================
// AUDIO HOOK
// ====================================================================

function useAudio() {
  const acRef = useRef(null);
  const unlockedRef = useRef(false);
  const ensure = useCallback(() => {
    if (!acRef.current) {
      try { acRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (acRef.current && acRef.current.state === 'suspended') {
      try { acRef.current.resume(); } catch(e) {}
    }
    return acRef.current;
  }, []);

  // KRITICKÉ: AudioContext musí být odblokovaný gestem uživatele.
  // Bez tohoto by zvuky neza­hrály vůbec nebo až po druhém kliknutí.
  useEffect(() => {
    const unlock = () => {
      if (unlockedRef.current) return;
      const ac = ensure();
      if (!ac) return;
      // krátký tichý oscilátor pro garantované odblokování v Safari/iOS
      try {
        const o = ac.createOscillator(), g = ac.createGain();
        g.gain.value = 0.0001;
        o.connect(g); g.connect(ac.destination);
        o.start(0); o.stop(ac.currentTime + 0.01);
      } catch(e) {}
      if (ac.state !== 'suspended') unlockedRef.current = true;
    };
    const events = ['pointerdown','touchstart','keydown','click'];
    events.forEach(ev => document.addEventListener(ev, unlock, { capture:true, passive:true }));
    return () => { events.forEach(ev => document.removeEventListener(ev, unlock, { capture:true })); };
  }, [ensure]);

  const tone = useCallback((freq, dur, when, type, gain) => {
    const ac = ensure(); if (!ac) return;
    const t = ac.currentTime + (when || 0);
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.value = freq; o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.02);
  }, [ensure]);
  return useMemo(() => ({
    ding:   () => { tone(880, 0.16, 0, 'sine', 0.18); tone(1318, 0.2, 0.05, 'sine', 0.15); },
    coin:   () => { tone(988, 0.08, 0, 'square', 0.12); tone(1319, 0.13, 0.07, 'square', 0.12); },
    success:() => { [523,659,784,1047].forEach((f,i) => tone(f, 0.4, i*0.1, 'triangle', 0.16)); },
    undo:   () => { tone(300, 0.14, 0, 'sine', 0.12); },
    tap:    () => { tone(660, 0.06, 0, 'sine', 0.08); },
    // v47: jemné pípnutí pro připomínku času (3 tóny stoupající)
    softBeep: () => { tone(880, 0.12, 0, 'sine', 0.16); tone(1100, 0.12, 0.15, 'sine', 0.16); tone(1400, 0.14, 0.3, 'sine', 0.16); },
    // v47: alarm pro urgentní (4 střídavé tóny)
    urgentAlarm: () => {
      for (let i = 0; i < 4; i++) {
        tone(1200, 0.18, i * 0.25, 'square', 0.22);
        tone(900, 0.18, i * 0.25 + 0.12, 'square', 0.22);
      }
    },
    ensure,

}

// ====================================================================
// CONFETTI HOOK
// ====================================================================

function useConfetti() {
  const ref = useRef(null);
  const fire = useCallback((opts) => {
    const root = ref.current; if (!root) return;
    const colors = ['#ff4d8d','#8b5cf6','#22d3ee','#a3e635','#fbbf24','#fb7185'];
    const rect = root.getBoundingClientRect();
    const cx = (opts && opts.x != null) ? opts.x : rect.width/2;
    const cy = (opts && opts.y != null) ? opts.y : rect.height/2;
    const n = (opts && opts.n) || 70;
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      const sz = 8 + Math.random() * 10;
      d.style.cssText = `position:absolute;left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${colors[i % colors.length]};border-radius:${Math.random() < 0.5 ? '50%' : '3px'};`;
      root.appendChild(d);
      const ang = Math.random() * Math.PI * 2, dist = 120 + Math.random() * 320;
      const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist - (120 + Math.random() * 220);
      d.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px,${dy + 260}px) rotate(${Math.random()*900 - 450}deg)`, opacity: 1, offset: 0.7 },
        { transform: `translate(${dx*1.1}px,${dy + 460}px) rotate(${Math.random()*900}deg)`, opacity: 0 }
      ], { duration: 1100 + Math.random()*800, easing: 'cubic-bezier(.2,.6,.3,1)' }).onfinish = () => d.remove();
    }
  }, []);
  return { ref, fire };
}

// ====================================================================
// WEATHER HOOK (Open-Meteo, žádný API klíč)
// ====================================================================

function useWeather(soundOn) {
  const [data, setData] = useState(null);
  const [err, setErr] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const cacheKey = 'dompomocnik_weather_cache';
    // load cache first
    try {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const c = JSON.parse(cached);
        if (Date.now() - c.t < 30*60*1000) {
          setData(c.d);
        }
      }
    } catch(e) {}

    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + LOCATION.lat
      + '&longitude=' + LOCATION.lon
      + '&current=temperature_2m,weather_code,wind_speed_10m,precipitation'
      + '&hourly=temperature_2m,weather_code,precipitation_probability'
      + '&daily=temperature_2m_min,temperature_2m_max,precipitation_probability_max,weather_code'
      + '&timezone=Europe%2FPrague&forecast_days=1';

    fetch(url)
      .then(r => r.json())
      .then(j => {
        if (cancelled) return;
        const cur = j.current || {};
        const day = (j.daily || {});
        const hrly = j.hourly || {};
        // v52: vytáhnout 3 časové úseky - ráno (8h), odpoledne (14h), večer (19h)
        const periods = {};
        if (Array.isArray(hrly.time) && Array.isArray(hrly.temperature_2m)) {
          const hourly = hrly.time.map((t, i) => ({
            hour: new Date(t).getHours(),
            temp: hrly.temperature_2m[i],
            code: hrly.weather_code ? hrly.weather_code[i] : null,
            rainProb: hrly.precipitation_probability ? hrly.precipitation_probability[i] : null
          }));
          const find = (h) => hourly.find(x => x.hour === h);
          periods.morning   = find(8)  || null;
          periods.afternoon = find(14) || null;
          periods.evening   = find(19) || null;
        }
        const d = {
          temp: cur.temperature_2m,
          wind: cur.wind_speed_10m,
          precip: cur.precipitation,
          code: cur.weather_code,
          tmin: day.temperature_2m_min ? day.temperature_2m_min[0] : null,
          tmax: day.temperature_2m_max ? day.temperature_2m_max[0] : null,
          rainProb: day.precipitation_probability_max ? day.precipitation_probability_max[0] : null,
          periods: periods,
        };
        setData(d);
        try { localStorage.setItem(cacheKey, JSON.stringify({ t: Date.now(), d })); } catch(e) {}
      })
      .catch(e => { if (!cancelled) setErr(e.message); });

    return () => { cancelled = true; };
  }, []);

  // WMO code → emoji + popis
  const visual = useMemo(() => {
    if (!data) return null;
    const c = data.code;
    let icon = '☀️', label = 'jasno';
    if (c == 0) { icon='☀️'; label='jasno'; }
    else if (c <= 3) { icon='⛅'; label='polojasno'; }
    else if (c <= 48) { icon='🌫️'; label='mlha'; }
    else if (c <= 57) { icon='🌦️'; label='mrholí'; }
    else if (c <= 67) { icon='🌧️'; label='déšť'; }
    else if (c <= 77) { icon='🌨️'; label='sníh'; }
    else if (c <= 82) { icon='🌧️'; label='přeháňky'; }
    else if (c <= 86) { icon='🌨️'; label='sněhové přeháňky'; }
    else { icon='⛈️'; label='bouřka'; }
    return { icon, label };
  }, [data]);

  const outfit = useMemo(() => {
    if (!data) return null;
    // Pro doporučení oblečení použij max denní teplotu (kid bude venku v nejteplejším čase),
    // ne aktuální (ráno bývá mnohem chladněji než odpoledne)
    const t = data.tmax != null ? data.tmax : data.temp;
    return suggestOutfit(t, (data.rainProb||0)/100, data.wind);
  }, [data]);

  return { data, err, visual, outfit };
}

// ====================================================================
// TTS HOOK (Web Speech API - česky pokud dostupné)
// ====================================================================

function useTTS(enabled) {
  const voiceRef = useRef(null);
  const lastSpokenRef = useRef({ key: null, t: 0 });

  useEffect(() => {
    if (!('speechSynthesis' in window)) return;
    const pickVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      // preferuj čeština, jinak slovenština, jinak default
      let v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith('cs'));
      if (!v) v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith('sk'));
      if (!v) v = voices[0];
      voiceRef.current = v || null;
    };
    pickVoice();
    window.speechSynthesis.onvoiceschanged = pickVoice;
    return () => { window.speechSynthesis.onvoiceschanged = null; };
  }, []);

  const speak = useCallback((key, text) => {
    if (!enabled) return;
    if (!('speechSynthesis' in window)) return;
    // anti-spam: stejný klíč max 1x za 8s
    const now = Date.now();
    if (lastSpokenRef.current.key === key && now - lastSpokenRef.current.t < 8000) return;
    lastSpokenRef.current = { key, t: now };
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      if (voiceRef.current) u.voice = voiceRef.current;
      u.lang = (voiceRef.current && voiceRef.current.lang) || 'cs-CZ';
      u.rate = 1.0; u.pitch = 1.05; u.volume = 0.95;
      // v43: Keepalive - Chrome/iOS zastaví TTS po ~15s pro "úsporu baterie".
      // Trick: každých 5s pause+resume udržuje engine při životě.
      let keepaliveId = null;
      const stopKeepalive = function() {
        if (keepaliveId) { clearInterval(keepaliveId); keepaliveId = null; }
      };
      u.onstart = function() {
        keepaliveId = setInterval(function() {
          if (window.speechSynthesis.speaking) {
            window.speechSynthesis.pause();
            window.speechSynthesis.resume();
          } else {
            stopKeepalive();
          }
        }, 5000);
      };
      u.onend = stopKeepalive;
      u.onerror = stopKeepalive;
      window.speechSynthesis.speak(u);
    } catch(e) {}
  }, [enabled]);

  const sayRandom = useCallback((key, pool) => {
    if (!pool || !pool.length) return;
    const text = pool[Math.floor(Math.random()*pool.length)];
    speak(key, text);
  }, [speak]);

  return { speak, sayRandom };
}

  // Fallback - default fox

}


// v52: WalletKidForm - dětská verze, jen výdaje (kid si zaznamenává co koupil)
function WalletKidForm({ balance, onSubmit }) {
  const [amount, setAmount] = useState('');
  const [reason, setReason] = useState('');

  const submit = () => {
    const n = parseInt(amount, 10);
    if (!n || n < 1) return;
    if (n > balance) {
      window.alert('Hej, tolik peněz nemáš! Máš jen ' + balance + ' Kč.');
      return;
    }
    onSubmit(n, reason.trim());
    setAmount('');
    setReason('');
  };

  return (
    <React.Fragment>
      <div style={{ display:'flex', gap:10, marginBottom:10 }}>
        <input value={amount} onChange={(e) => setAmount(e.target.value.replace(/[^\d]/g, ''))} placeholder="Kč" inputMode="numeric" style={{ width:120, border:'2px solid #e3e3ea', borderRadius:14, padding:'14px 12px', fontSize:24, fontWeight:700, textAlign:'center', fontFamily:'var(--display)' }}/>
        <input value={reason} onChange={(e) => setReason(e.target.value)} placeholder="Za co? (sladkost, hračka, …)" style={{ flex:1, minWidth:0, border:'2px solid #e3e3ea', borderRadius:14, padding:'14px 16px', fontSize:16 }}/>
      </div>
      <div onClick={submit} style={{ cursor:'pointer', background: amount && parseInt(amount,10) > 0 ? 'linear-gradient(135deg, #dc2626, #991b1b)' : '#cbd5e1', color:'#fff', fontFamily:'var(--display)', fontWeight:600, fontSize:18, padding:16, borderRadius:16, textAlign:'center' }}>
        💸 Zapsat výdaj {amount && parseInt(amount,10) > 0 ? '(' + amount + ' Kč)' : ''}
      </div>
    </React.Fragment>
  );
}

  // ---------------------- v15: Google Calendar fetch ----------------------
  const parseICal = useCallback((text) => {
    // v41: Robustnější iCal parser
    // - Filtruje STATUS:CANCELLED
    // - Podporuje opakující se události (RRULE FREQ=DAILY/WEEKLY)
    // - DTSTART s TZID i UTC i all-day
    // - SUMMARY se escapováním + fallback na "(bez názvu)"
    // - Filtruje EXDATE (vyjímky z opakování)
    if (!text || typeof text !== 'string') return [];
    const rawBlocks = text.split('BEGIN:VEVENT');
    const parsedEvents = [];

    for (let i = 1; i < rawBlocks.length; i++) {
      const block = rawBlocks[i].split('END:VEVENT')[0];
      const ev = { exdates: [] };
      // Unfold (CRLF + space/tab pokračování)
      const lines = block.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '').split(/\r?\n/);
      let cancelled = false;

      for (const line of lines) {
        if (line.startsWith('STATUS:')) {
          if (line.slice(7).trim().toUpperCase() === 'CANCELLED') cancelled = true;
        } else if (line.startsWith('SUMMARY')) {
          // SUMMARY:Foo nebo SUMMARY;LANGUAGE=cs:Foo
          const colonIdx = line.indexOf(':');
          if (colonIdx >= 0) {
            ev.summary = line.slice(colonIdx + 1).replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\n/gi, ' ').replace(/\\\\/g, '\\').trim();
          }
        } else if (line.startsWith('DTSTART')) {
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          const params = colonIdx >= 0 ? line.slice(0, colonIdx) : '';
          if (val) {
            const allDay = !val.includes('T');
            const isUTC = val.endsWith('Z'); // ends with Z = UTC time
            const hasTZID = params.indexOf('TZID=') >= 0;
            ev.start = val;
            ev.allDay = allDay;
            let y = val.slice(0, 4), m = val.slice(4, 6), d = val.slice(6, 8);
            let hh = allDay ? '00' : val.slice(9, 11);
            let mm = allDay ? '00' : val.slice(11, 13);
            // v55: pokud je UTC (končí Z), zkonvertuj na lokální čas (Prague)
            if (isUTC && !allDay) {
              const utc = new Date(Date.UTC(parseInt(y), parseInt(m)-1, parseInt(d), parseInt(hh), parseInt(mm)));
              y = String(utc.getFullYear());
              m = pad2(utc.getMonth()+1);
              d = pad2(utc.getDate());
              hh = pad2(utc.getHours());
              mm = pad2(utc.getMinutes());
            }
            // Pokud má TZID nebo je floating (bez Z), HH:MM bereme jako lokální Prague
            ev.iso = `${y}-${m}-${d}`;
            ev.time = allDay ? '' : `${hh}:${mm}`;
            ev.dateTime = `${y}-${m}-${d}T${hh}:${mm}:00`;
            ev.startDate = new Date(parseInt(y), parseInt(m)-1, parseInt(d), parseInt(hh), parseInt(mm));
          }
        } else if (line.startsWith('DTEND')) {
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          if (val) {
            ev.end = val;
            // v55: extrahuj end čas (s UTC konverzí pokud Z) - kvůli délce události
            const isAllDay = !val.includes('T');
            if (!isAllDay) {
              const isUTC = val.endsWith('Z');
              let hh = val.slice(9, 11), mm = val.slice(11, 13);
              if (isUTC) {
                const ey = val.slice(0,4), em = val.slice(4,6), ed = val.slice(6,8);
                const utc = new Date(Date.UTC(parseInt(ey), parseInt(em)-1, parseInt(ed), parseInt(hh), parseInt(mm)));
                hh = pad2(utc.getHours());
                mm = pad2(utc.getMinutes());
              }
              ev.endTime = hh + ':' + mm;
            }
          }
        } else if (line.startsWith('LOCATION:')) {
          ev.location = line.slice(9).replace(/\\,/g, ',').trim();
        } else if (line.startsWith('UID:')) {
          ev.uid = line.slice(4).trim();
        } else if (line.startsWith('RRULE:')) {
          // Parse RRULE např: FREQ=WEEKLY;BYDAY=MO,WE,FR;UNTIL=20271231T000000Z
          const rules = {};
          line.slice(6).split(';').forEach(part => {
            const [k, v] = part.split('=');
            if (k && v) rules[k.toUpperCase()] = v;
          });
          ev.rrule = rules;
        } else if (line.startsWith('EXDATE')) {
          // EXDATE;TZID=...:YYYYMMDDTHHMMSS  nebo  EXDATE:YYYYMMDD
          const colonIdx = line.indexOf(':');
          const val = colonIdx >= 0 ? line.slice(colonIdx + 1).trim() : '';
          // Multiple dates oddělené čárkou
          val.split(',').forEach(d => {
            if (d.length >= 8) ev.exdates.push(d.slice(0, 8)); // YYYYMMDD
          });
        }
      }

      if (cancelled) continue;
      if (!ev.iso) continue;
      // Default summary pokud chybí
      if (!ev.summary) ev.summary = '(bez názvu)';

      parsedEvents.push(ev);
    }

    // Expanduj recurring events do konkrétních výskytů
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const horizon = new Date(today); horizon.setDate(today.getDate() + 90); // 3 měsíce dopředu pro nav po týdnech
    const result = [];

    for (const ev of parsedEvents) {
      if (!ev.rrule) {
        // Single event
        if (ev.startDate && ev.startDate >= today && ev.startDate <= horizon) {
          result.push(ev);
        }
        continue;
      }

      // Recurring - rozgeneruj výskyty
      const freq = ev.rrule.FREQ;
      if (freq !== 'DAILY' && freq !== 'WEEKLY') {
        // Pro MONTHLY/YEARLY zatím jen první výskyt
        if (ev.startDate && ev.startDate >= today && ev.startDate <= horizon) {
          result.push(ev);
        }
        continue;
      }

      // BYDAY (jen pro WEEKLY): MO,TU,WE,TH,FR,SA,SU
      const dayMap = { MO:1, TU:2, WE:3, TH:4, FR:5, SA:6, SU:0 };
      const byday = ev.rrule.BYDAY ? ev.rrule.BYDAY.split(',').map(d => dayMap[d]) : null;

      // UNTIL boundary
      let until = horizon;
      if (ev.rrule.UNTIL) {
        const u = ev.rrule.UNTIL;
        if (u.length >= 8) {
          const ud = new Date(parseInt(u.slice(0,4)), parseInt(u.slice(4,6))-1, parseInt(u.slice(6,8)));
          if (ud < until) until = ud;
        }
      }

      const interval = parseInt(ev.rrule.INTERVAL) || 1;
      const startDate = ev.startDate;
      if (!startDate) continue;

      // Generuj výskyty od today (nebo startDate, podle toho co je pozdější) do until
      const generateFrom = startDate < today ? today : startDate;
      const cursor = new Date(generateFrom);
      cursor.setHours(startDate.getHours(), startDate.getMinutes(), 0, 0);

      let count = 0;
      const maxCount = 200; // safety

      while (cursor <= until && count < maxCount) {
        let include = false;

        if (freq === 'DAILY') {
          // Zahrň každý den (interval-tý)
          const daysSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24));
          if (daysSinceStart >= 0 && daysSinceStart % interval === 0) include = true;
        } else if (freq === 'WEEKLY') {
          if (byday) {
            if (byday.indexOf(cursor.getDay()) >= 0) {
              const weeksSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24*7));
              if (weeksSinceStart >= 0 && weeksSinceStart % interval === 0) include = true;
            }
          } else {
            // Bez BYDAY = stejný den v týdnu jako startDate
            if (cursor.getDay() === startDate.getDay()) {
              const weeksSinceStart = Math.floor((cursor - startDate) / (1000*60*60*24*7));
              if (weeksSinceStart >= 0 && weeksSinceStart % interval === 0) include = true;
            }
          }
        }

        if (include) {
          const y = cursor.getFullYear();
          const m = pad2(cursor.getMonth()+1);
          const d = pad2(cursor.getDate());
          const dateKey = `${y}${m}${d}`;
          // Skip pokud je tento výskyt v EXDATE
          if (ev.exdates.indexOf(dateKey) < 0) {
            result.push({
              ...ev,
              iso: `${y}-${m}-${d}`,
              dateTime: `${y}-${m}-${d}T${ev.time || '00:00'}:00`,
            });
            count++;
          }
        }

        cursor.setDate(cursor.getDate() + 1);
      }
    }

    return result.sort((a, b) => (a.dateTime || a.iso).localeCompare(b.dateTime || b.iso));
  }, []);

  // v29: Webhook polling - tahá z Apps Script "events" endpoint

  const triggerHueAction = useCallback((action, label) => {
    if (!action || !action.type || action.type === 'none') return;

  const hueLastTsRef = useRef(null);

  useEffect(() => {
    if (!effectiveHueWebhookUrl || !effectiveHueWebhookUrl.trim()) return;
    const url = effectiveHueWebhookUrl.trim();
    let cancelled = false;
    const tick = async () => {
      if (cancelled) return;
      try {
        const since = hueLastTsRef.current || '';
        const sep = url.includes('?') ? '&' : '?';
        const res = await fetch(url + sep + 'action=events&since=' + encodeURIComponent(since));
        if (!res.ok) return;
        const events = await res.json();
        if (!Array.isArray(events) || events.length === 0) return;
        const ordered = [...events].sort((a,b) => (a.ts || '').localeCompare(b.ts || ''));
        let latestTs = hueLastTsRef.current;
        for (const ev of ordered) {
          if (!ev || !ev.key || !ev.ts) continue;
          if (hueLastTsRef.current && ev.ts <= hueLastTsRef.current) continue;
          const btn = hueButtonsRef.current.find(b => b.key === ev.key);
          if (btn && btn.action) {
            triggerHueActionRef.current(btn.action, btn.label || ev.key);
          }
          setHueEvents(prev => [{ ts: ev.ts, key: ev.key, label: btn ? (btn.label || btn.key) : '(nepřiřazeno)' }, ...prev].slice(0, 10));
          if (!latestTs || ev.ts > latestTs) latestTs = ev.ts;
        }
        if (latestTs) hueLastTsRef.current = latestTs;
        setHueLastError(null);
      } catch (e) {
        // tichá chyba
      }
    };
    // První tick: zjisti aktuální stav. Pouze pokud ref ještě není inicializován (první mount).
    const init = async () => {
      if (hueLastTsRef.current) return; // už jsme byli inicializováni
      try {
        const sep = url.includes('?') ? '&' : '?';
        const res = await fetch(url + sep + 'action=events');
        const events = await res.json();
        if (Array.isArray(events) && events.length > 0) {
          hueLastTsRef.current = events[0].ts;
        } else {
          hueLastTsRef.current = new Date().toISOString();
        }
        setHueLastError('Připojeno · poslouchám stisky');
      } catch (e) {
        setHueLastError('Chyba spojení: ' + e.message);
      }
    };
    init();
    const id = setInterval(tick, 3000);
    return () => { cancelled = true; clearInterval(id); };
  }, [effectiveHueWebhookUrl]); // VÝHRADNĚ jen URL - nepřipojovat hueButtons ani triggerHueAction

  const [gcalFetchStatus, setGcalFetchStatus] = useState('idle'); // idle | fetching | ok | error

  const fetchGcal = useCallback(async (force) => {
    if (!gcalUrl || !gcalUrl.startsWith('http')) {
      setGcalFetchError('URL kalendáře není nastavena nebo je nevalidní');
      setGcalFetchStatus('error');
      return;
    }
    // Cache 15 minut pokud nepřišlo force
    if (!force && Date.now() - gcalLastFetch < 15 * 60 * 1000) return;
    setGcalFetchStatus('fetching');
    setGcalFetchError('');
    // v51: zkusit více proxies postupně - allorigins občas selhává
    const proxies = [
      (u) => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
      (u) => 'https://corsproxy.io/?' + encodeURIComponent(u),
      (u) => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    ];
    let lastErr = '';
    for (let pi = 0; pi < proxies.length; pi++) {
      const proxyUrl = proxies[pi](gcalUrl);
      try {
        const r = await fetch(proxyUrl);
        if (!r.ok) { lastErr = 'HTTP ' + r.status + ' z proxy #' + (pi+1); continue; }
        const text = await r.text();
        if (!text || text.length < 50) { lastErr = 'Prázdná odpověď z proxy #' + (pi+1); continue; }
        if (text.indexOf('BEGIN:VCALENDAR') < 0 && text.indexOf('BEGIN:VEVENT') < 0) {
          lastErr = 'Proxy #' + (pi+1) + ' nevrátil iCal data (možná HTML chyba)';
          continue;
        }
        let events = [];
        try {
          events = parseICal(text);
        } catch (parseErr) {
          lastErr = 'Chyba parsování iCal: ' + parseErr.message;
          continue;
        }
        setGcalEvents(events);
        setGcalLastFetch(Date.now());
        setGcalFetchStatus('ok');
        if (force) showToast('Načteno ' + events.length + ' událostí (proxy #' + (pi+1) + ')', '📅');
        return;
      } catch (e) {
        lastErr = 'Proxy #' + (pi+1) + ' selhal: ' + (e.message || e);
        console.warn(lastErr);
      }
    }
    // Všechny proxies selhaly
    setGcalFetchError(lastErr + '. Zkus to za chvíli znovu — proxy servery občas mají výpadek.');
    setGcalFetchStatus('error');
    if (force) showToast('Všechny proxies selhaly', '⚠');
  }, [gcalUrl, gcalLastFetch, parseICal, showToast]);

  const playVoice = useCallback((eventIdOrArray, fallbackText) => {
    if (!soundOn) return;
    // v45: STOP všechno co momentálně hraje - MP3 i TTS - před spuštěním nového hlasu
    // Tohle řeší problém "dva hlasy přes sebe"

    // v43: podpora pole klíčů - zkusí postupně, vezme první co má hlásku
    const candidates = Array.isArray(eventIdOrArray) ? eventIdOrArray : [eventIdOrArray];
    let rawValue = null;
    let eventId = candidates[0]; // pro logging
    for (let i = 0; i < candidates.length; i++) {
      const c = candidates[i];
      // 1. uživatel-nastavený voiceMap
      let v = voiceMapRef.current[c];
      if (v && String(v).trim()) { rawValue = v; eventId = c; break; }

      }
    }
    if (rawValue) {
      const variants = String(rawValue).split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
      if (variants.length > 0) {
        const pick = variants[Math.floor(Math.random() * variants.length)];
        const url = resolveVoiceUrl(pick);
        if (url) {
          try {
            if (voiceAudioRef.current) {
              try { voiceAudioRef.current.pause(); } catch(e) {}
            }
            const a = new Audio(url);
            a.volume = 0.95;

            setVoiceLastUrl(url);

            // v25: error handler na audio element pro 404/dekódování
            a.onerror = (e) => {
              const code = a.error ? a.error.code : '?';
              const codeMap = {1:'ABORTED', 2:'NETWORK', 3:'DECODE', 4:'NOT_SUPPORTED/404'};
              const msg = `Audio error (code ${code} = ${codeMap[code]||'?'}): ${url}`;
              console.warn(msg, e);
              setVoiceLastError(msg);
              setVoiceState('error');
              if (ttsOn && fallbackText) tts.speak(eventId, fallbackText);
            };
            a.onloadedmetadata = () => {
              setVoiceDuration(a.duration);
            };
            a.onplaying = () => { setVoiceState('playing'); setVoiceLastError(null); };
            a.onended = () => { setVoiceState('done'); };
            const playPromise = a.play();
            if (playPromise && playPromise.catch) {
              playPromise.catch((err) => {
                const msg = `Play blocked: ${err && err.name} - ${err && err.message} (${url})`;

            const msg = `Audio exception: ${e.message} (${url})`;
            setVoiceLastError(msg);
            console.warn(msg, e);
          }
        }
      }
    }
    if (ttsOn && fallbackText) tts.speak(eventId, fallbackText);
  }, [soundOn, ttsOn, resolveVoiceUrl, tts]);

      const r = await fetch(syncUrl, {

        // Content-Type text/plain aby se vyhnulo CORS preflight (Apps Script vzor)
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'pull' }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'pull failed');
      if (j.state) {
        const remoteState = typeof j.state === 'string' ? JSON.parse(j.state) : j.state;
        // Pouze přijmi pokud je server novější než to co jsem naposled pushnul
        if (!lastPushedStateRef.current || j.updated !== lastPushedStateRef.current) {
          applySnapshot(remoteState);
          lastPushedStateRef.current = j.updated;
        }
      }
      setLastSyncTime(j.updated || new Date().toISOString());
      setSyncStatus('ok');
      setSyncError(null);
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
    }
  }, [syncUrl, applySnapshot]);

  // PUSH na server
  const pushToServer = useCallback(async () => {
    if (!syncUrl) return;
    setSyncStatus('syncing');
    try {
      const snap = buildSnapshot();
      const r = await fetch(syncUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'push', state: snap }),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || 'push failed');
      lastPushedStateRef.current = j.updated;
      setLastSyncTime(j.updated);
      setSyncStatus('ok');
      setSyncError(null);
    } catch (e) {
      setSyncStatus('error');
      setSyncError(e.message || String(e));
    }
  }, [syncUrl, buildSnapshot]);

  // Init pull při prvním načtení nebo změně URL
  useEffect(() => {
    if (!syncUrl) { setSyncStatus('disabled'); initialPullDoneRef.current = false; return; }
    if (initialPullDoneRef.current) return;
    initialPullDoneRef.current = true;
    pullFromServer(false);
    // eslint-disable-next-line
  }, [syncUrl]);

  // Periodický pull každých 30s
  useEffect(() => {
    if (!syncUrl) return;
    const id = setInterval(() => pullFromServer(true), 30000);
    return () => clearInterval(id);
  }, [syncUrl, pullFromServer]);

  // Debounced push při změně stavu (3s po poslední změně)
  useEffect(() => {
    if (!syncUrl || !initialPullDoneRef.current) return;
    const t = setTimeout(() => { pushToServer(); }, 3000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [
    points, totalXp, doneM, doneE, choreState, pendingApprovals,
    shopState, weeklyDone, challenges, packState, packAwarded,
    streakDays, eveningStreakDays, moodLog,
    worryMessages, readingList, stickers,
    morning, evening, shopItems, choresList, weeklyChores,
    weekEvents, rozvrh, buttonConfig,
    mascotName, childName, childPhoto, soundOn, ttsOn,
    bedtime, wakeTime, praiseMessages, parentPin,
    whoHome, departMin,
  ]);

  // Funkce pro testovací sync (z UI)
  const manualSync = useCallback(async () => {
    if (!syncUrl) { showToast('Nejdřív nastav URL', '⚠️'); return; }
    await pushToServer();
    await pullFromServer(false);
    if (syncStatus !== 'error') showToast('Synchronizováno', '✓');
  }, [syncUrl, pushToServer, pullFromServer, showToast, syncStatus]);


  // ukázat mood prompt po dokončení ranní rutiny (jen 1x za den)
  useEffect(() => {
    const list = morning.filter(s => s.on);
    const allDone = list.length > 0 && list.every(s => doneM[s.id]);
    if (allDone && !todayMoodDone && !showMoodPrompt) {
      // krátké zpoždění aby si dítě nejdřív užilo konfety
      const t = setTimeout(() => setShowMoodPrompt(true), 4500);
      return () => clearTimeout(t);
    }
  }, [doneM, morning, todayMoodDone, showMoodPrompt]);

  // Sticker auto-award triggery - kontrola po každé změně stavu
  useEffect(() => {
    const have = new Set(stickers.map(s => s.id));
    const toAward = [];
    // Definice nálepek a podmínek
    const totalPagesRead = readingList.reduce((sum, b) => sum + (b.pagesRead || 0), 0);
    const finishedBooks = readingList.filter(b => b.pagesRead >= b.pagesTotal && b.pagesTotal > 0).length;
    const candidates = [
      { id:'first-routine', emoji:'🌟', name:'První rutina',     cond: totalXp >= 10 },
      { id:'streak-7',      emoji:'🔥', name:'Týden v řadě',    cond: streakDays >= 7 },
      { id:'streak-14',     emoji:'💪', name:'Dva týdny',         cond: streakDays >= 14 },
      { id:'streak-30',     emoji:'🏆', name:'Měsíc hrdina',     cond: streakDays >= 30 },
      { id:'points-100',    emoji:'💎', name:'100 bodů',          cond: totalXp >= 100 },
      { id:'points-500',    emoji:'👑', name:'500 bodů',          cond: totalXp >= 500 },
      { id:'reader-50',     emoji:'📖', name:'50 stránek',        cond: totalPagesRead >= 50 },
      { id:'reader-200',    emoji:'📚', name:'200 stránek',       cond: totalPagesRead >= 200 },
      { id:'book-finished', emoji:'🎓', name:'Dočetl knihu',    cond: finishedBooks >= 1 },
      { id:'helper-5',      emoji:'🧹', name:'5x pomohl',         cond: pendingApprovals.length === 0 && choreState && Object.keys(choreState).filter(k => choreState[k] === 'done').length >= 5 },
    ];
    candidates.forEach(c => {
      if (c.cond && !have.has(c.id)) {
        toAward.push({ id: c.id, emoji: c.emoji, name: c.name, date: new Date().toISOString() });
      }
    });
    if (toAward.length > 0) {
      setStickers(s => [...s, ...toAward]);
      toAward.forEach(s => {
        setTimeout(() => showToast(`Nová nálepka: ${s.name}`, s.emoji), 600);
      });
      audio.success();
      confetti.fire({ n: 80 });
      if (playVoiceRef.current) playVoiceRef.current('stickerNew', 'Nová nálepka!');
    }
    // eslint-disable-next-line
  }, [totalXp, streakDays, readingList, choreState]);

  // greeting jednou při vstupu (pokud audio už odemknuté user gestem)
  const greetedRef = useRef(false);
  useEffect(() => {
    if (entered && !greetedRef.current && ttsOn) {
      greetedRef.current = true;
      setTimeout(() => {
        // v27: skip auto-pozdravu pokud user ještě nic neklepnul (autoplay blokovaný)
        if (!audioUnlockedRef.current) return;
        const h = new Date().getHours();
        const evt = h < 10 ? 'morning' : (h >= 18 ? 'evening' : 'hello');
        if (sayRikiVoiceRef.current) sayRikiVoiceRef.current(evt, RIKI_PHRASES.hello);
      }, 800);
    }
  }, [entered, ttsOn, tts]);

  // v10: ?sync=... URL param automaticky nastaví Apps Script URL (pro sdílení mezi zařízeními)
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const syncParam = params.get('sync');
      if (syncParam && syncParam.startsWith('http') && syncParam !== syncUrl) {
        setSyncUrl(syncParam);
        showToast('Synchronizace nastavena 🔄', '✓');
        // Vyčistit URL aby se znovu nenastavila
        try {
          const url = new URL(window.location.href);
          url.searchParams.delete('sync');
          window.history.replaceState(null, '', url.toString());
        } catch(e) {}
      }
    } catch(e) {}
    // eslint-disable-next-line
  }, []);

  // Hue URL trigger: ?do=wc spustí akci. Apple Home Shortcut otevře tuhle URL po stisku tlačítka.
  useEffect(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const doKey = params.get('do');
      if (!doKey) return;
      const t = TASK_CATALOG.find(x => x.key === doKey);
      if (!t || t.key === 'none') return;
      // krátké zpoždění aby se appka stihla namountovat
      const tm = setTimeout(() => {
        triggerTask(t);
        showToast(`Hue: ${t.label}`, t.emoji);
        // vyčistit URL aby reload neaktivoval znovu
        try {
          const clean = window.location.origin + window.location.pathname;
          window.history.replaceState(null, '', clean);
        } catch(e) {}
      }, 800);
      return () => clearTimeout(tm);
    } catch(e) {}
    // eslint-disable-next-line
  }, [entered]);

  // proaktivní cache (bez SW - jednoduchý warmup pro offline použití)
  // Pro plný offline-first režim přidej sw.js vedle index.html (viz README)
  useEffect(() => {
    if (!('caches' in window)) return;
    try {
      const urls = [
        location.href,
        'https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&display=swap',
        'https://unpkg.com/react@18.3.1/umd/react.production.min.js',
        'https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js',
        'https://unpkg.com/@babel/standalone@7.24.7/babel.min.js'
      ];
      caches.open('dp-v3-warm').then(c => {
        urls.forEach(u => { c.add(u).catch(() => {}); });
      }).catch(() => {});
    } catch(e) {}
  }, []);

  // ====================================================================
  // RENDER
  // ====================================================================
  return (
    <div style={rootStyle}>
      <div ref={confetti.ref} style={{ position:'absolute', inset:0, pointerEvents:'none', zIndex:90, overflow:'hidden' }}/>

      {/* v14: Floating XP čísla */}
      <div style={{ position:'fixed', inset:0, pointerEvents:'none', zIndex:95, overflow:'hidden' }}>
        {floatingXp.map(f => (
          <div key={f.id} style={{
            position:'absolute',
            left: f.x,

            fontWeight: 800,

              ? '0 0 12px rgba(245,158,11,.8), 0 3px 0 #fff, 0 3px 18px rgba(0,0,0,.4)'

      {/* Na mobilu zobrazujeme jen rodičovský overlay; kid screeny jsou pro tablet. */}
      {!isMobile && (

        <div style={{ display:'flex', alignItems:'center', gap:18, animation: ent(0) }}>
          {childPhoto && (
            <div style={{ width:64, height:64, borderRadius:'50%', background: `url(${childPhoto}) center/cover`, border:'3px solid #fff', boxShadow:'var(--shadow)', flex:'none' }}/>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:17, fontWeight:800, letterSpacing:'.14em', textTransform:'uppercase', color:'var(--muted)' }}>{dateLine}</div>
            <div style={{ fontFamily:'var(--display)', fontSize:42, fontWeight:600, lineHeight:1.05, color:'var(--ink)', marginTop:2 }}>{greeting}</div>
          </div>
          {syncUrl && (
            <div title={`Sync: ${syncStatus}`} style={{ width:10, height:10, borderRadius:'50%', background:
              syncStatus === 'ok' ? '#16a34a' :
              syncStatus === 'syncing' ? '#f59e0b' :
              syncStatus === 'error' ? '#dc2626' : '#9ca3af',
              boxShadow: syncStatus === 'ok' ? '0 0 8px rgba(22,163,74,.5)' : 'none', flex:'none' }}/>
          )}
          {/* v53: 💬 vzkazy a 🔘 tlačítka odstraněny z dashboardu - jsou v admin nastavení */}
          <div onClick={openParent} style={{ cursor:'pointer', width:54, height:54, borderRadius:18, background:'var(--surface)', border:'var(--hair)', boxShadow:'var(--shadow)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, position:'relative' }} title="Rodičovský režim">
            🔒
            {pendingApprovals.length > 0 && (
              <div style={{ position:'absolute', top:-4, right:-4, background:'#dc2626', color:'#fff', fontSize:12, fontWeight:900, borderRadius:11, minWidth:22, height:22, lineHeight:'22px', padding:'0 6px', boxShadow:'0 2px 6px rgba(0,0,0,.25)', border:'2px solid #fff' }}>
                {pendingApprovals.length}
              </div>
            )}
          </div>
        </div>

        {/* v17+v23: A — barevný pruh dne, B — TEACCH pictogram timeline (full width) */}
        {(() => {
          const nowD = new Date();
          const totalMins = nowD.getHours() * 60 + nowD.getMinutes();
          const dayProgress = totalMins / (24 * 60);
          const h = nowD.getHours();
          // v51: české hranice fází
          let phase, phaseColor, phaseEmoji, phaseStartH, phaseEndH;
          if (h < 5)       { phase = 'NOC';       phaseColor = '#1e1b4b'; phaseEmoji = '🌙'; phaseStartH = 0;  phaseEndH = 5; }
          else if (h < 9)  { phase = 'RÁNO';      phaseColor = '#fb923c'; phaseEmoji = '🌅'; phaseStartH = 5;  phaseEndH = 9; }
          else if (h < 12) { phase = 'DOPOLEDNE'; phaseColor = '#facc15'; phaseEmoji = '☀️'; phaseStartH = 9;  phaseEndH = 12; }
          else if (h < 13) { phase = 'OBĚD';      phaseColor = '#dc2626'; phaseEmoji = '🍽️'; phaseStartH = 12; phaseEndH = 13; }
          else if (h < 17) { phase = 'ODPOLEDNE'; phaseColor = '#16a34a'; phaseEmoji = '🌳'; phaseStartH = 13; phaseEndH = 17; }
          else if (h < 22) { phase = 'VEČER';     phaseColor = '#7c3aed'; phaseEmoji = '🌆'; phaseStartH = 17; phaseEndH = 22; }
          else             { phase = 'NOC';       phaseColor = '#1e3a8a'; phaseEmoji = '🌙'; phaseStartH = 22; phaseEndH = 24; }
          // Střed segmentu fáze v % (0-100)
          const phaseMidPct = ((phaseStartH + phaseEndH) / 2 / 24) * 100;

          const todaysBp = (dayBlueprintByDay && dayBlueprintByDay[todayDayIdx]) || DAY_BLUEPRINT;
          const blueprintMins = todaysBp.map(b => ({ ...b, mins: (function(){ const p = String(b.time||'0:0').split(':'); return parseInt(p[0])*60+parseInt(p[1]); })() }));
          let currentIdx = -1;
          for (let i = blueprintMins.length - 1; i >= 0; i--) {
            if (blueprintMins[i].mins <= totalMins) { currentIdx = i; break; }
          }
          const upcoming = blueprintMins.find(b => b.mins > totalMins);
          const remainingMins = upcoming ? Math.max(0, upcoming.mins - totalMins) : 0;
          const remH = Math.floor(remainingMins / 60);
          const remM = remainingMins % 60;
          const prevMs = currentIdx >= 0 ? blueprintMins[currentIdx].mins : 0;
          const nextMs = upcoming ? upcoming.mins : 24*60;
          const phasePct = nextMs > prevMs ? Math.min(1, Math.max(0, (totalMins - prevMs) / (nextMs - prevMs))) : 0;

          // v23: detekce špatného víkendového rozvrhu
          const isWeekendToday = todayDayIdx >= 5;
          const hasSchoolMilestone = blueprintMins.some(b => /škol/i.test(b.label || ''));
          const weekendNeedsFix = isWeekendToday && hasSchoolMilestone;

          return (
            <div style={{ display:'flex', flexDirection:'column', gap:10, animation: ent(0.5) }}>
              {/* Weekend fix banner */}
              {weekendNeedsFix && (
                <div style={{ background:'linear-gradient(135deg, #fef3c7, #fde68a)', border:'2px solid #f59e0b', borderRadius:14, padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                  <span style={{ fontSize:24 }}>🎉</span>
                  <div style={{ flex:1, fontSize:13, fontWeight:700, color:'#92400e', lineHeight:1.4 }}>
                    Dnes je víkend, ale rozvrh obsahuje školu. Mám použít víkendový rozvrh?
                  </div>
                  <div onClick={() => {
                    if (!window.confirm('Přepíše dnešní den víkendovým rozvrhem (vstávat 8:00, snídaně, hraní, oběd, ...). Pokračovat?')) return;
                    audio.tap();
                    const def = WEEKEND_BLUEPRINT.map(b => ({...b, id: b.id + '-' + (todayDayIdx === 5 ? 'sa' : 'su')}));
                    setDayBlueprintByDay(all => all.map((day, i) => i === todayDayIdx ? def : day));
                  }} style={{ cursor:'pointer', background:'#f59e0b', color:'#fff', borderRadius:10, padding:'8px 14px', fontWeight:800, fontSize:13, whiteSpace:'nowrap', boxShadow:'0 4px 12px rgba(245,158,11,.3)' }}>✓ Použít víkend</div>
                  <div onClick={() => {
                    audio.tap();
                    // V tichosti zruš - mark this day as "kept by user" by adding a flag? Pro teď jen close.
                  }} title="Zavřít" style={{ cursor:'pointer', width:28, height:28, borderRadius:8, color:'#92400e', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900 }}>✕</div>
                </div>
              )}

              {/* A — barevný pruh + integrovaný phase badge + countdown v JEDNOM ROW */}
              <div style={{ display:'grid', gridTemplateColumns: upcoming ? '1fr auto' : '1fr', gap:14, alignItems:'center' }}>
                <div style={{ position:'relative' }}>
                  <div style={{ position:'relative', height: 36, borderRadius: 18, background: 'linear-gradient(90deg, #1e1b4b 0%, #1e1b4b 20.8%, #fb923c 20.8%, #fb923c 37.5%, #facc15 37.5%, #facc15 50%, #dc2626 50%, #dc2626 54.2%, #16a34a 54.2%, #16a34a 70.8%, #7c3aed 70.8%, #7c3aed 91.6%, #1e3a8a 91.6%)', overflow:'visible', boxShadow:'0 4px 14px rgba(0,0,0,.18)', border:'2px solid #fff' }}>
                    {/* Slunce/měsíc */}
                    <div style={{
                      position:'absolute',
                      left: 'calc(' + (dayProgress * 100) + '% - 22px)',
                      top: '50%',
                      transform: 'translateY(-50%)',
                      width: 48, height: 48,
                      borderRadius: '50%',
                      background: '#fff',
                      boxShadow: '0 0 22px rgba(255,200,0,.85), 0 4px 12px rgba(0,0,0,.25)',
                      display:'flex',
                      alignItems:'center',
                      justifyContent:'center',
                      fontSize: 26,
                      border: '3px solid '+phaseColor,
                      zIndex: 2,
                      transition: 'left 1s linear'
                    }}>
                      {phaseEmoji}
                    </div>
                    {/* v51: Phase badge nad středem aktuálního segmentu (ne pevně vlevo) */}
                    <div style={{
                      position:'absolute',
                      left: 'calc(' + phaseMidPct + '% - 50px)',
                      top:'50%',
                      transform:'translateY(-50%)',
                      width: 100,
                      textAlign:'center',
                      background:'rgba(0,0,0,.45)',
                      color:'#fff',
                      borderRadius:12,
                      padding:'4px 10px',
                      fontWeight:800,
                      fontSize:13,
                      letterSpacing:'.06em',
                      zIndex:1,
                      backdropFilter:'blur(4px)',
                      transition:'left .5s ease',
                      pointerEvents:'none'
                    }}>
                      {phase}
                    </div>
                  </div>
                  {/* Hodinové značky */}
                  <div style={{ position:'relative', height:14, marginTop:4 }}>
                    {[0,6,12,18,24].map(hh => (
                      <div key={hh} style={{ position:'absolute', left: ((hh/24)*100) + '%', transform:'translateX(-50%)', fontSize:10, fontWeight:800, color:'var(--muted)' }}>
                        {hh < 10 ? '0'+hh+':00' : hh+':00'}

                  </div>

                {/* Countdown jako tiskněnka vpravo */}
                {upcoming && (
                  <div style={{ display:'flex', alignItems:'center', gap:12, background:'#fff', borderRadius:14, padding:'10px 16px', boxShadow:'0 4px 14px rgba(0,0,0,.08)', border:'var(--hair)' }}>
                    <span style={{ fontSize:30, lineHeight:1 }}>{upcoming.emoji}</span>
                    <div>
                      <div style={{ fontSize:10, fontWeight:800, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>Do "{upcoming.label}"</div>
                      <div style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:600, color: remainingMins < 30 ? '#dc2626' : remainingMins < 60 ? '#f59e0b' : '#16a34a' }}>
                        {remH > 0 ? remH + 'h ' : ''}{remM}min
                      </div>
                    </div>
                    <svg width="40" height="40" style={{ transform:'rotate(-90deg)' }}>
                      <circle cx="20" cy="20" r="16" fill="none" stroke="#e5e7eb" strokeWidth="4"/>
                      <circle cx="20" cy="20" r="16" fill="none" stroke={remainingMins < 30 ? '#dc2626' : remainingMins < 60 ? '#f59e0b' : '#16a34a'} strokeWidth="4" strokeDasharray={100} strokeDashoffset={100 * phasePct} strokeLinecap="round" style={{ transition:'stroke-dashoffset 1s' }}/>
                    </svg>
                  </div>
                )}
              </div>

              {/* C — TEACCH pictogram timeline (v55: skryto, je už v rutině) */}
              <div style={{ display:'none' }}>
                {blueprintMins.map((b, idx) => {
                  const isCurrent = idx === currentIdx;
                  const isDone = idx < currentIdx;
                  return (
                    <div key={b.id} style={{
                      background: isCurrent ? '#fef3c7' : isDone ? '#f3f4f6' : '#fff',
                      border: isCurrent ? '2px solid #f59e0b' : isDone ? '1px solid #e5e7eb' : '1px solid #cbd5e1',
                      borderRadius: 10,
                      padding: '6px 3px',
                      textAlign:'center',
                      opacity: isDone ? 0.5 : 1,
                      animation: isCurrent ? 'softPulse 1.8s ease-in-out infinite' : 'none',
                      boxShadow: isCurrent ? '0 4px 12px rgba(245,158,11,.35)' : '0 1px 3px rgba(0,0,0,.05)',
                      transition:'all .3s',
                      minWidth: 0
                    }}>
                      <div style={{ fontSize: isCurrent ? 24 : 20, lineHeight: 1, filter: isDone ? 'grayscale(0.8)' : 'none' }}>{b.emoji}</div>
                      <div style={{ fontSize: 9, fontWeight: 800, color: isCurrent ? '#92400e' : isDone ? '#9ca3af' : '#1a1530', marginTop: 2, textTransform:'uppercase', letterSpacing:'.02em', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                        {isDone ? '✓ ' : ''}{b.label}
                      </div>
                      <div style={{ fontSize: 9, fontWeight: 700, color: isCurrent ? '#b45309' : '#9ca3af', marginTop: 1 }}>{b.time}</div>

        {/* main grid - 3 sloupce */}
        <div style={{ display:'grid', gridTemplateColumns:'1.15fr 1fr 1fr', gap:14 }}>

          {/* COL 1 — Modrý banner + Rutina */}
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>

            {/* semafor */}
            <div style={{ background:'var(--hero)', borderRadius:22, padding:'14px 18px', display:'flex', alignItems:'center', gap:14, boxShadow:'var(--shadow)', position:'relative', overflow:'hidden', border:'var(--hair)', animation: ent(1) }}>

          <div style={{ display:'flex', flexDirection:'column', background:'var(--surface)', border:'var(--hair)', borderRadius:22, padding:'14px 12px', boxShadow:'var(--shadow)', overflow:'auto' }}>
            <div style={{ fontSize:11, fontWeight:900, letterSpacing:'.12em', textTransform:'uppercase', color:'var(--muted)', textAlign:'center', marginBottom:10 }}>Co dnes uděláme</div>
            {(() => {
              // Vrátím list kroků se stavy: done/current/future
              const list = (rKind === 'morning' ? morning : evening).filter(s => s.on);
              const map = rKind === 'morning' ? doneM : doneE;
              const currentIdx = list.findIndex(s => !map[s.id]);
              return list.map((s, i) => {
                const isDone = !!map[s.id];
                const isCurrent = i === currentIdx;
                const isFuture = !isDone && !isCurrent;
                return (
                  <div key={s.id} style={{
                    display:'flex', alignItems:'center', gap:10,
                    padding: isCurrent ? '12px 12px' : '8px 10px',
                    margin: '4px 0',
                    background: isCurrent ? 'linear-gradient(135deg, var(--accent), var(--accent2))' : (isDone ? '#dcfce7' : 'transparent'),
                    border: isCurrent ? '3px solid var(--accent)' : (isDone ? '1px solid #86efac' : '1px solid #e6e6ec'),
                    borderRadius:14,
                    opacity: isFuture ? 0.5 : 1,
                    boxShadow: isCurrent ? '0 4px 14px var(--accentShadow)' : 'none',
                    transition: 'all .25s',
                    animation: isCurrent ? 'softPulse 2s ease-in-out infinite' : 'none'
                  }}>
                    <div style={{ fontSize: isCurrent ? 30 : 22, lineHeight:1, filter: isDone ? 'grayscale(.5)' : 'none' }}>{s.icon}</div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:'var(--display)', fontSize: isCurrent ? 15 : 13, fontWeight:600, color: isCurrent ? '#fff' : (isDone ? '#166534' : 'var(--ink)'), lineHeight:1.1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.t}</div>
                      {isCurrent && <div style={{ fontSize:10, fontWeight:900, color:'rgba(255,255,255,.85)', textTransform:'uppercase', letterSpacing:'.1em', marginTop:2 }}>▶ Děláš teď</div>}
                    </div>
                    {isDone && <div style={{ fontSize:18, color:'#16a34a', fontWeight:900 }}>✓</div>}
                    {isFuture && <div style={{ fontSize:10, fontWeight:800, color:'#9a96ac' }}>{(list.filter((x, j) => j > i && !map[x.id]).length === list.length - i - 1 ? ((i - currentIdx)) : '')}</div>}
                  </div>
                );
              });
            })()}
          </div>

          {/* PRAVÝ SLOUPEC: Current step focus */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:18, minWidth:0 }}>
            {/* Kruhový časovač */}
            {(() => {
              const expected = routine.current.secs || 180;
              const started = currentStepStart || nowTick;
              const elapsed = (nowTick - started) / 1000;
              const pct = Math.min(1, elapsed / expected);
              const overtime = elapsed > expected;
              const remaining = Math.max(0, expected - elapsed);
              const mins = Math.floor(remaining / 60);
              const secs = Math.floor(remaining % 60);
              const ringColor = pct < 0.6 ? '#16a34a' : pct < 0.9 ? '#f59e0b' : pct < 1 ? '#fb923c' : '#dc2626';
              const sandEmoji = pct < 0.5 ? '🟢' : pct < 0.85 ? '⏳' : '⏰';
              const R = 110, C = 2 * Math.PI * R;
              const dash = C * (1 - pct);
              return (
                <div style={{ position:'relative', width:250, height:250 }}>
                  <svg width="250" height="250" style={{ position:'absolute', inset:0, transform:'rotate(-90deg)' }}>
                    <circle cx="125" cy="125" r={R} stroke="#f0f0f7" strokeWidth="12" fill="none"/>
                    <circle cx="125" cy="125" r={R} stroke={ringColor} strokeWidth="12" fill="none"
                      strokeLinecap="round"
                      strokeDasharray={C}
                      strokeDashoffset={dash}
                      style={{ transition:'stroke-dashoffset .8s ease, stroke .4s' }} />
                  </svg>
                  <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', animation: overtime ? 'shake 0.6s infinite' : 'none' }}>
                    <div key={routine.current.id} style={{ fontSize:100, lineHeight:1, animation:'popIn .5s ease' }}>{routine.current.icon}</div>
                    <div style={{ marginTop:6, display:'flex', alignItems:'center', gap:6, background:'#fff', borderRadius:18, padding:'6px 12px', boxShadow:'0 4px 12px rgba(0,0,0,.08)', border:`2px solid ${ringColor}` }}>
                      <span style={{ fontSize:18 }}>{sandEmoji}</span>
                      <span style={{ fontFamily:'var(--display)', fontSize:18, fontWeight:600, color: ringColor }}>
                        {overtime ? 'Už jen ' : ''}{mins > 0 ? mins + ':' + (secs < 10 ? '0' : '') + secs : secs + 's'}
                        {overtime && '⚠'}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })()}

            {/* Step title + hint */}
            <div style={{ textAlign:'center', maxWidth:560 }}>
              <div style={{ fontFamily:'var(--display)', fontSize:42, fontWeight:600, color:'var(--ink)', lineHeight:1.02 }}>{routine.current.t}</div>
              <div style={{ fontSize:17, fontWeight:700, color:'var(--muted)', marginTop:8, lineHeight:1.3 }}>💬 {routine.current.hint}</div>
              {/* v46: U kroku 'obleci' ukaž doporučené oblečení podle reálného počasí */}
              {routine.current.isObleci && routine.current.weatherOutfit && routine.current.weatherOutfit.length > 0 && (
                <div style={{ marginTop:14, display:'flex', flexWrap:'wrap', gap:8, justifyContent:'center' }}>
                  {routine.current.weatherOutfit.map((part, i) => (
                    <div key={i} style={{
                      display:'flex', alignItems:'center', gap:8,
                      background:'#fff', border:'2px solid #93c5fd',
                      borderRadius:14, padding:'8px 14px',
                      boxShadow:'0 3px 10px rgba(59,130,246,.15)'
                    }}>
                      <span style={{ fontSize:24, lineHeight:1 }}>{part.icon}</span>
                      <span style={{ fontFamily:'var(--display)', fontSize:14, fontWeight:600, color:'#0c4a6e' }}>{part.t}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Special button pro zuby */}
            {routine.current.isZuby && (
              <div onClick={() => openBrush(rKind)} style={{ cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:10, background:'linear-gradient(135deg, #06b6d4, #0891b2)', color:'#fff', fontFamily:'var(--display)', fontSize:20, fontWeight:600, padding:'14px 26px', borderRadius:16, boxShadow:'0 12px 26px -8px #06b6d4' }}>🪥 Bojuj se špínou (2 min)</div>
            )}

            {/* Hotovo + skip */}
            <div style={{ display:'flex', gap:14, width:'100%', maxWidth:580, marginTop:6 }}>
              <div onClick={() => checkStep(rKind, routine.current.id)} style={{ cursor:'pointer', flex:1, background:'var(--accent)', color:'#fff', fontFamily:'var(--display)', fontSize:26, fontWeight:600, padding:18, borderRadius:20, textAlign:'center', boxShadow:'0 14px 30px -8px var(--accentShadow)' }}>Hotovo! ✓</div>
              <div onClick={() => skipStep(rKind)} style={{ cursor:'pointer', padding:'18px 20px', borderRadius:20, background:'var(--surface)', border:'var(--hair)', fontFamily:'var(--display)', fontSize:18, fontWeight:500, color:'var(--muted)' }}>Přeskočit</div>
            </div>
          </div>
        </div>
        )}

        {routine.allDone && (
        <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:22, padding:30, textAlign:'center' }}>
          <div style={{ fontSize:140, animation:'popIn .6s ease' }}>🎉</div>
          <div style={{ fontFamily:'var(--display)', fontSize:60, fontWeight:600, color:'var(--ink)', lineHeight:1 }}>{routine.doneTitle}</div>
          <div style={{ fontSize:24, fontWeight:700, color:'var(--muted)', maxWidth:620 }}>{routine.doneSub}</div>
          <div style={{ display:'flex', alignItems:'center', gap:11, background:'var(--accent)', color:'#fff', fontFamily:'var(--display)', fontSize:30, fontWeight:600, padding:'16px 30px', borderRadius:20, boxShadow:'0 14px 30px -8px var(--accentShadow)', animation:'popIn .6s ease .15s both' }}>+{routine.reward} bodů ⭐</div>
          <div onClick={() => go('home')} style={{ cursor:'pointer', marginTop:6, padding:'16px 34px', borderRadius:18, background:'var(--surface)', border:'var(--hair)', fontFamily:'var(--display)', fontSize:22, fontWeight:500, color:'var(--ink)', boxShadow:'var(--shadow)' }}>Zpátky domů</div>
        </div>
        )}
      </div>
      )}

      {/* ===================== CALENDAR ===================== */}
      {screen === 'calendar' && (
      <div data-screen-label="Kalendář" style={{ position:'absolute', inset:0, padding:'26px 30px', display:'flex', flexDirection:'column', gap:18 }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div onClick={() => go('home')} style={{ cursor:'pointer', width:52, height:52, borderRadius:17, background:'var(--surface)', border:'var(--hair)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:23, boxShadow:'var(--shadow)' }}>←</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--display)', fontSize:32, fontWeight:600, color:'var(--ink)', lineHeight:1 }}>
              {weekOffset === 0 ? 'Tento týden' : weekOffset === -1 ? 'Minulý týden' : weekOffset === 1 ? 'Příští týden' : weekOffset < 0 ? `Před ${-weekOffset} týdny` : `Za ${weekOffset} týdny`}
            </div>
            <div style={{ fontSize:15, fontWeight:800, color:'var(--muted)', marginTop:2, display:'flex', alignItems:'center', gap:8 }}>
              {(() => {
                // Datum prvního a posledního dne
                const lastDay = new Date(monday); lastDay.setDate(lastDay.getDate() + 6);
                const months = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
                const dateRange = `${monday.getDate()}. ${months[monday.getMonth()]} – ${lastDay.getDate()}. ${months[lastDay.getMonth()]}`;
                return <span>{dateRange}</span>;
              })()}
              {gcalUrl && weekOffset === 0 && (
                <span style={{ display:'inline-flex', alignItems:'center', gap:5, color: gcalEvents.length > 0 ? 'var(--good)' : '#f59e0b' }}>● {gcalEvents.length > 0 ? `Google: ${gcalEvents.length} událostí` : 'GCal načítá…'}</span>
              )}
            </div>
          </div>
          {/* Week navigation */}
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div onClick={() => { audio.tap(); setWeekOffset(w => w - 1); }} style={{ cursor:'pointer', width:42, height:42, borderRadius:14, background:'var(--surface)', border:'var(--hair)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:800, boxShadow:'var(--shadow)' }}>‹</div>
            {weekOffset !== 0 && (
              <div onClick={() => { audio.tap(); setWeekOffset(0); }} style={{ cursor:'pointer', padding:'10px 14px', borderRadius:14, background:'var(--accent)', color:'#fff', fontWeight:800, fontSize:13, boxShadow:'var(--shadow)' }}>Dnes</div>
            )}
            <div onClick={() => { audio.tap(); setWeekOffset(w => w + 1); }} style={{ cursor:'pointer', width:42, height:42, borderRadius:14, background:'var(--surface)', border:'var(--hair)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:800, boxShadow:'var(--shadow)' }}>›</div>
          </div>
          <div style={{ display:'flex', gap:14 }}>
            {placeLegend.map((l, i) => (
              <div key={i} style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ width:15, height:15, borderRadius:5, background: l.color }}/>
                <span style={{ fontWeight:800, color:'var(--ink)' }}>{l.label}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', background:'var(--surface)', border:'var(--hair)', borderRadius:22, boxShadow:'var(--shadow)', overflow:'hidden' }}>
          <div style={{ display:'grid', gridTemplateColumns:'54px repeat(7,1fr)', borderBottom:'var(--hair)', flex:'none' }}>
            <div/>
            {weekDays.map((day, i) => (
              <div key={i} style={{ padding:'9px 8px 8px', textAlign:'center', background: day.headBg, color: day.headInk, borderLeft:'1px solid var(--gridline)' }}>
                <div style={{ fontFamily:'var(--display)', fontSize:16, fontWeight:600, lineHeight:1 }}>{day.dayName} {day.date}</div>
                <div style={{ marginTop:5, display:'inline-flex', alignItems:'center', gap:5, background: day.whoBg, padding:'3px 8px', borderRadius:8 }}>
                  <div style={{ width:8, height:8, borderRadius:'50%', background: day.whoColor }}/>
                  <span style={{ fontSize:11, fontWeight:900, color: day.whoInk }}>{day.whoLabel}</span>
                </div>
                {/* v49: celodenní události jako chipy */}
                {day.allDayEvents && day.allDayEvents.length > 0 && (
                  <div style={{ marginTop:6, display:'flex', flexDirection:'column', gap:3 }}>
                    {day.allDayEvents.map((e, ei) => (
                      <div key={ei} title={e.title} style={{
                        background: day.isToday ? 'rgba(255,255,255,.25)' : 'rgba(30, 64, 175, .15)',
                        color: day.isToday ? '#fff' : '#1e40af',
                        borderRadius:7,
                        padding:'3px 6px',
                        fontSize:10, fontWeight:800,
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                        textAlign:'left',
                        display:'flex', alignItems:'center', gap:4
                      }}>
                        <span style={{ fontSize:10 }}>📅</span>
                        <span style={{ flex:1, minWidth:0, overflow:'hidden', textOverflow:'ellipsis' }}>{e.title}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
          <div style={{ flex:1, minHeight:0, overflow:'auto' }}>
            <div style={{ display:'grid', gridTemplateColumns:'54px repeat(7,1fr)', height: cal.bodyH, position:'relative' }}>
              <div style={{ position:'relative' }}>
                {cal.hours.map((hh, i) => (
                  <div key={i} style={{ position:'absolute', top: hh.top, right:8, transform:'translateY(-50%)', fontSize:12, fontWeight:800, color:'var(--muted)' }}>{hh.label}</div>
                ))}
              </div>
              {weekDays.map((day, di) => (
                <div key={di} style={{ position:'relative', borderLeft:'1px solid var(--gridline)', background: day.colBg }}>
                  {cal.hours.map((hh, i) => (
                    <div key={i} style={{ position:'absolute', left:0, right:0, top: hh.top, borderTop:'1px solid var(--gridline)' }}/>
                  ))}
                  {day.events.map((e, i) => (
                    <div key={i} style={{ position:'absolute', left:4, right:4, top: e.top, height: e.height, background: e.bg, borderLeft:`4px solid ${e.color}`, borderRadius:9, padding:'5px 8px', overflow:'hidden' }}>
                      <div style={{ fontSize:11, fontWeight:900, color: e.color }}>{e.time}</div>
                      <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:1 }}>
                        <span style={{ fontSize:14 }}>{e.emoji}</span>
                        <span style={{ fontFamily:'var(--display)', fontSize:13, fontWeight:600, color:'var(--ink)', lineHeight:1.05 }}>{e.title}</span>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
      )}


      {/* ===================== CURSUS HEROUM (v44) ===================== */}
      {screen === 'cursus' && (
      <div data-screen-label="Cursus" style={{ position:'absolute', inset:0, background:'linear-gradient(180deg, #1e1b4b 0%, #312e81 100%)', display:'flex', flexDirection:'column' }}>
        {/* Hvězdy v pozadí */}
        {[...Array(60)].map((_, i) => (
          <div key={i} style={{ position:'absolute', top:(Math.random()*100)+'%', left:(Math.random()*100)+'%', width:(Math.random()*2.5+0.8)+'px', height:(Math.random()*2.5+0.8)+'px', background:'#fff', borderRadius:'50%', opacity:0.3+Math.random()*0.7, animation:`blink ${3+Math.random()*4}s infinite`, pointerEvents:'none' }}/>
        ))}

        {/* Header */}
        <div style={{ padding:'22px 26px', display:'flex', alignItems:'center', gap:16, position:'relative', zIndex:1 }}>
          <div onClick={() => go('home')} style={{ cursor:'pointer', width:48, height:48, borderRadius:16, background:'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.22)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, color:'#fff' }}>←</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:700, color:'#fff', lineHeight:1, letterSpacing:'.04em' }}>CURSUS HEROUM</div>
            <div style={{ fontSize:13, fontWeight:700, color:'rgba(255,255,255,.6)', marginTop:3 }}>Cesta hrdiny · {cursusUnlocked.length} z {CURSUS_STAGES.length} oblastí</div>
          </div>
          <div style={{ background:'rgba(251,191,36,.18)', border:'1px solid rgba(251,191,36,.4)', borderRadius:14, padding:'9px 16px', fontFamily:'var(--display)', fontSize:18, fontWeight:700, color:'#fbbf24' }}>⭐ {totalXp}</div>
        </div>

        {/* Mapa */}
        <div style={{ flex:1, position:'relative', overflow:'hidden', margin:'8px 20px 20px' }}>
          <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position:'absolute', inset:0, width:'100%', height:'100%' }}>
            {/* Spojnice mezi stages */}
            {CURSUS_PATH.slice(0, -1).map((p, i) => {
              const next = CURSUS_PATH[i+1];
              const isPath = i < cursusUnlocked.length; // svítí pokud je další stage taky odemčena
              return (
                <line key={i} x1={p.x} y1={p.y} x2={next.x} y2={next.y}
                  stroke={isPath ? '#fbbf24' : 'rgba(255,255,255,.15)'}
                  strokeWidth={isPath ? '0.6' : '0.4'}
                  strokeDasharray={isPath ? '0' : '1.5 1'}
                  vectorEffect="non-scaling-stroke"
                />
              );
            })}
          </svg>

          {/* Stages jako klikatelné nody */}
          {CURSUS_STAGES.map((stage, idx) => {
            const pos = CURSUS_PATH[idx];
            const isUnlocked = cursusUnlocked.indexOf(stage.id) >= 0;
            const isNext = !isUnlocked && idx === cursusUnlocked.length;
            const isFuture = !isUnlocked && idx > cursusUnlocked.length;
            const canAfford = isNext && totalXp >= stage.costXp;
            const nodeSize = isNext ? 64 : 52;
            return (
              <div key={stage.id} onClick={() => {
                if (isFuture) {
                  showToast('Nejdřív odemkni předchozí oblast', '🔒');
                  audio.undo();
                  return;
                }
                if (isUnlocked) {
                  // Ukázat detail stage
                  setCursusJustUnlocked(stage);
                  audio.tap();
                  return;
                }
                // isNext - zkusit odemknout
                if (totalXp < stage.costXp) {
                  showToast('Potřebuješ ' + (stage.costXp - totalXp) + ' XP víc', '⭐');
                  audio.undo();
                  return;
                }
                // ODEMKNI!
                setCursusUnlocked(arr => [...arr, stage.id]);
                setCursusJustUnlocked(stage);
                audio.success();
                confetti.fire({ n: stage.item.isFinal ? 300 : 150 });
                if (playVoiceRef.current) {
                  playVoiceRef.current(['cursus-' + stage.id, 'questComplete'], stage.item.isFinal ? 'Cursus dokončen! Jsi legenda.' : 'Nová oblast! ' + stage.item.name + '!');
                }
              }} style={{
                position:'absolute',
                left:`calc(${pos.x}% - ${nodeSize/2}px)`,
                top:`calc(${pos.y}% - ${nodeSize/2}px)`,
                width:nodeSize, height:nodeSize,
                borderRadius:'50%',
                background: isUnlocked ? stage.color : (isNext ? (canAfford ? 'linear-gradient(135deg, #fbbf24, #f59e0b)' : 'rgba(255,255,255,.1)') : 'rgba(20,16,40,.6)'),
                border: isUnlocked ? '3px solid #fff' : (isNext ? '3px solid ' + (canAfford ? '#fff' : 'rgba(251,191,36,.6)') : '2px solid rgba(255,255,255,.2)'),
                display:'flex', alignItems:'center', justifyContent:'center',
                cursor: 'pointer',
                fontSize: isNext ? 30 : 24,
                boxShadow: isUnlocked ? '0 4px 16px ' + stage.color + '70' : (canAfford ? '0 4px 20px rgba(251,191,36,.6)' : 'none'),
                animation: canAfford ? 'softPulse 1.5s ease-in-out infinite' : 'none',
                filter: isFuture ? 'grayscale(.7) opacity(.45)' : 'none',
                transition:'all .3s',
                zIndex: isNext ? 3 : 2
              }}>
                {isUnlocked ? stage.emoji : (isNext ? (canAfford ? '🔓' : '🔒') : '?')}
              </div>
            );
          })}
        </div>

        {/* Info box dole */}
        <div style={{ margin:'0 20px 20px', position:'relative', zIndex:1 }}>
          {(() => {
            const nextIdx = cursusUnlocked.length;
            if (nextIdx >= CURSUS_STAGES.length) {
              return (
                <div style={{ background:'linear-gradient(135deg, #fbbf24, #f59e0b)', borderRadius:18, padding:'14px 18px', color:'#7c2d12' }}>
                  <div style={{ fontFamily:'var(--display)', fontSize:20, fontWeight:700 }}>👑 LEGENDA</div>
                  <div style={{ fontSize:13, fontWeight:700, marginTop:2 }}>Dokončil/a jsi celou cestu hrdiny! Můžeš se vrátit k jakékoliv oblasti a podívat se na trofeje.</div>
                </div>
              );
            }
            const next = CURSUS_STAGES[nextIdx];
            const needed = next.costXp - totalXp;
            const pct = Math.min(100, Math.max(0, totalXp / next.costXp * 100));
            return (
              <div style={{ background:'rgba(255,255,255,.08)', backdropFilter:'blur(8px)', border:'1px solid rgba(255,255,255,.15)', borderRadius:18, padding:'14px 18px', color:'#fff' }}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:8 }}>
                  <div style={{ fontSize:30 }}>{next.emoji}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:'var(--display)', fontSize:17, fontWeight:600 }}>Další: {next.name}</div>
                    <div style={{ fontSize:12, fontWeight:700, color:'rgba(255,255,255,.7)', marginTop:2 }}>{needed > 0 ? `Potřebuješ ještě ${needed} XP` : 'Klikni na zámek 🔓 a odemkni!'}</div>
                  </div>
                  <div style={{ fontFamily:'var(--display)', fontSize:14, fontWeight:700, color:'#fbbf24' }}>{totalXp} / {next.costXp}</div>
                </div>
                {/* Progress bar */}
                <div style={{ background:'rgba(255,255,255,.1)', borderRadius:8, height:8, overflow:'hidden' }}>
                  <div style={{ background: needed <= 0 ? 'linear-gradient(90deg, #fbbf24, #f59e0b)' : 'linear-gradient(90deg, #6366f1, #8b5cf6)', height:'100%', width:pct + '%', transition:'width .5s ease' }}/>
                </div>
              </div>
            );
          })()}
        </div>
      </div>
      )}

      {/* CURSUS detail/unlock modal */}

          <div style={{ background:'var(--surface)', border:'var(--hair)', borderRadius:24, padding:'20px 22px', boxShadow:'var(--shadow)', display:'flex', flexDirection:'column', gap:12, minHeight:0 }}>

                    <div style={{ fontSize:12, fontWeight:800, color:'var(--muted)' }}>{it.reason}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
