      {/* ===================== ČIŠTĚNÍ ZUBŮ ===================== */}
      {screen === 'zuby' && (
      <div data-screen-label="Čištění zubů" style={{ position:'absolute', inset:0, background:'linear-gradient(180deg, #dbeafe 0%, #bfdbfe 50%, #93c5fd 100%)', display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Bubliny v pozadí */}
        {[...Array(15)].map((_, i) => (
          <div key={i} style={{
            position:'absolute',
            top: '110%',
            left: (5 + Math.random() * 90) + '%',
            width: (20 + Math.random() * 30) + 'px',
            height: (20 + Math.random() * 30) + 'px',
            borderRadius:'50%',
            background:'radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255,255,255,.3))',
            border:'2px solid rgba(255,255,255,.6)',
            animation: `bubbleUp ${8 + Math.random() * 6}s linear infinite`,
            animationDelay: (Math.random() * 6) + 's',
            pointerEvents:'none'
          }}/>
        ))}

        <div style={{ padding:'22px 30px', display:'flex', alignItems:'center', gap:18, position:'relative', zIndex:2 }}>
          <div onClick={() => { pauseBrush(); setScreen(brushReturn ? 'routine' : 'home'); }} style={{ cursor:'pointer', width:54, height:54, borderRadius:18, background:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, boxShadow:'0 4px 16px rgba(0,0,0,.1)' }}>←</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--display)', fontSize:30, fontWeight:600, color:'#0c4a6e', lineHeight:1 }}>🪥 Bojuj se špínou!</div>
            <div style={{ fontSize:15, fontWeight:800, color:'#075985', marginTop:2 }}>{brush.totalLabel} · 2 minuty pro krásné zoubky</div>
          </div>
          {(() => {
            const elapsedPct = Math.min(1, brushElapsed / 120);
            const monsters = Math.max(0, 16 - Math.floor(elapsedPct * 16));
            return (
              <div style={{ background:'rgba(255,255,255,.85)', borderRadius:18, padding:'10px 18px', textAlign:'center', boxShadow:'0 4px 12px rgba(0,0,0,.08)' }}>

                <div style={{ fontFamily:'var(--display)', fontSize:24, fontWeight:700, color: monsters > 8 ? '#dc2626' : monsters > 0 ? '#f59e0b' : '#16a34a' }}>{monsters} 👾</div>
              </div>
            );
          })()}
        </div>

        <div style={{ flex:1, minHeight:0, display:'flex', alignItems:'center', justifyContent:'center', padding:'0 30px 24px', position:'relative', zIndex:1 }}>
          <div style={{ width:'100%', maxWidth:1000, display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:32, alignItems:'center' }}>

            {/* SVG mouth with teeth + monsters */}
            <div style={{ position:'relative', aspectRatio:'1.3/1' }}>
              <svg viewBox="0 0 520 400" style={{ width:'100%', height:'100%', filter:'drop-shadow(0 8px 24px rgba(0,0,0,.15))' }}>
                {/* Lips outline */}
                <ellipse cx="260" cy="200" rx="220" ry="160" fill="#fda4af" stroke="#be123c" strokeWidth="4"/>
                {/* Inner mouth (darker) */}
                <ellipse cx="260" cy="200" rx="180" ry="125" fill="#9f1239"/>
                {/* Tongue */}
                <ellipse cx="260" cy="290" rx="120" ry="40" fill="#f43f5e"/>

                {/* Upper teeth row - 8 teeth */}
                {(() => {
                  const elapsedPct = Math.min(1, brushElapsed / 120);
                  const upperTeeth = [];
                  for (let i = 0; i < 8; i++) {
                    const x = 110 + i * 38;
                    const cleanThreshold = (i + 1) / 8 * 0.5; // upper teeth cleaned in first half
                    const plaqueOpacity = elapsedPct < cleanThreshold ? 0.7 : Math.max(0, 0.7 - (elapsedPct - cleanThreshold) * 3);
                    const sparkle = plaqueOpacity < 0.1 && brushRunning;
                    upperTeeth.push(
                      <g key={'up' + i}>
                        {/* Tooth shape */}
                        <rect x={x} y={108} width={30} height={48} rx={6} fill="#fff" stroke="#e5e7eb" strokeWidth="1.5"/>
                        {/* Plaque overlay (yellow/brown) */}
                        <rect x={x + 2} y={110} width={26} height={44} rx={4} fill="#ca8a04" opacity={plaqueOpacity} style={{ transition:'opacity .8s ease' }}/>
                        {/* Sparkle when clean */}
                        {sparkle && (
                          <text x={x + 15} y={138} fontSize="14" textAnchor="middle" fill="#fbbf24" style={{ animation:'softPulse 1s ease-in-out infinite' }}>✨</text>
                        )}
                      </g>
                    );
                  }
                  return upperTeeth;
                })()}

                {/* Lower teeth row */}
                {(() => {
                  const elapsedPct = Math.min(1, brushElapsed / 120);
                  const lowerTeeth = [];
                  for (let i = 0; i < 8; i++) {
                    const x = 110 + i * 38;
                    const cleanThreshold = 0.5 + (i + 1) / 8 * 0.5; // lower teeth cleaned in second half
                    const plaqueOpacity = elapsedPct < cleanThreshold ? 0.7 : Math.max(0, 0.7 - (elapsedPct - cleanThreshold) * 3);
                    const sparkle = plaqueOpacity < 0.1 && brushRunning;
                    lowerTeeth.push(
                      <g key={'lo' + i}>
                        <rect x={x} y={232} width={30} height={48} rx={6} fill="#fff" stroke="#e5e7eb" strokeWidth="1.5"/>
                        <rect x={x + 2} y={234} width={26} height={44} rx={4} fill="#ca8a04" opacity={plaqueOpacity} style={{ transition:'opacity .8s ease' }}/>
                        {sparkle && (
                          <text x={x + 15} y={262} fontSize="14" textAnchor="middle" fill="#fbbf24" style={{ animation:'softPulse 1s ease-in-out infinite' }}>✨</text>
                        )}
                      </g>
                    );
                  }
                  return lowerTeeth;
                })()}

                {/* v53: ŠIPKA na aktuální zub - která se má teď čistit */}
                {brushRunning && brushElapsed < 120 && (() => {
                  // Quadrant: 0=horní pravá (z pohledu dítěte = vlevo z naší strany),
                  //           1=horní levá, 2=dolní levá, 3=dolní pravá
                  const bQuad = Math.min(3, Math.floor(brushElapsed / 30));
                  const secInQuad = brushElapsed % 30;
                  // 4 zuby v kvadrantu × 7.5s = 30s
                  const toothInQuad = Math.min(3, Math.floor(secInQuad / 7.5));
                  const isUpper = bQuad < 2;
                  // Mapování quadrant → indexy zubů v řadě (z naší strany pohledu)
                  // Q0 horní pravá dítěte = naše vlevo = indexy 0..3
                  // Q1 horní levá dítěte = naše vpravo = indexy 4..7
                  // Q2 dolní levá dítěte = naše vpravo = indexy 4..7 (ale projdeme zprava doleva)
                  // Q3 dolní pravá dítěte = naše vlevo = indexy 0..3 (zprava doleva)
                  let baseIdx, toothIdx;
                  if (bQuad === 0) { baseIdx = 0; toothIdx = baseIdx + toothInQuad; }
                  else if (bQuad === 1) { baseIdx = 4; toothIdx = baseIdx + toothInQuad; }
                  else if (bQuad === 2) { baseIdx = 4; toothIdx = baseIdx + toothInQuad; }
                  else { baseIdx = 0; toothIdx = baseIdx + toothInQuad; }
                  // Pozice zubu v SVG: x = 110 + i*38, šířka 30, takže střed = 110 + i*38 + 15
                  const toothCenterX = 110 + toothIdx * 38 + 15;
                  // Y pozice šipky
                  const arrowY = isUpper ? 88 : 320;
                  const arrowChar = isUpper ? '⬇️' : '⬆️';
                  // Glow ring kolem aktivního zubu
                  const toothY = isUpper ? 108 : 232;
                  return (
                    <React.Fragment>
                      {/* Zlatý ring kolem aktivního zubu - pulzuje */}
                      <rect
                        x={110 + toothIdx * 38 - 4}
                        y={toothY - 4}
                        width={38}
                        height={56}
                        rx={10}
                        fill="none"
                        stroke="#fbbf24"
                        strokeWidth="3"
                        style={{ filter:'drop-shadow(0 0 8px #fbbf24)', animation:'softPulse 1s ease-in-out infinite' }}
                      />
                      {/* Šipka */}
                      <text x={toothCenterX} y={arrowY} fontSize="34" textAnchor="middle" style={{ animation:'softPulse 0.8s ease-in-out infinite' }}>{arrowChar}</text>
                      {/* Kartáček blízko šipky */}
                      <text x={toothCenterX} y={isUpper ? 58 : 365} fontSize="38" textAnchor="middle" style={{ transition:'x .8s ease, y .8s ease' }}>🪥</text>
                    </React.Fragment>
                  );
                })()}

                {/* Bakterie monsters - rozmístěné po zubech, mizí postupně */}
                {(() => {
                  const elapsedPct = Math.min(1, brushElapsed / 120);
                  const total = 16;
                  const alive = Math.max(0, total - Math.floor(elapsedPct * total));
                  const monsters = [];
                  // Spočítej které ještě jsou - od konce
                  for (let i = 0; i < alive; i++) {
                    const row = i % 2 === 0 ? 1 : 0;
                    const col = Math.floor(i / 2);
                    const x = 125 + col * 38;
                    const y = row === 0 ? 130 : 254;
                    const wobble = Math.sin((brushElapsed + i) * 1.5) * 3;
                    monsters.push(
                      <text key={'m' + i} x={x + wobble} y={y} fontSize="20" textAnchor="middle" style={{ transition:'all .5s' }}>👾</text>
                    );
                  }
                  return monsters;
                })()}
              </svg>
            </div>

            {/* RIGHT: timer + controls */}
            <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
              <div style={{ background:'rgba(255,255,255,.85)', borderRadius:22, padding:'18px 20px', boxShadow:'0 6px 18px rgba(0,0,0,.1)' }}>
                <div style={{ fontSize:13, fontWeight:900, letterSpacing:'.1em', textTransform:'uppercase', color:'#0c4a6e', marginBottom:4 }}>Teď čisti</div>
                <div style={{ fontFamily:'var(--display)', fontSize:38, fontWeight:700, color:'#0c4a6e', lineHeight:1.1 }}>{brush.quadName}</div>
                <div style={{ display:'flex', alignItems:'center', gap:14, marginTop:14 }}>
                  <div style={{ fontFamily:'var(--display)', fontSize:54, fontWeight:700, color:'#0c4a6e' }}>{brush.remQuad}<span style={{ fontSize:20, color:'#075985', fontWeight:800 }}>s</span></div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:800, color:'#075985', marginBottom:5 }}>Postup</div>
                    <div style={{ height:14, background:'rgba(255,255,255,.5)', borderRadius:8, overflow:'hidden' }}>
                      <div style={{ height:'100%', width: brush.totalPct+'%', background:'linear-gradient(90deg, #06b6d4, #0ea5e9)', transition:'width .9s linear' }}/>
                    </div>
                  </div>
                </div>
              </div>

              <div style={{ display:'flex', gap:12 }}>
                <div onClick={() => (brush.running ? pauseBrush() : startBrush())} style={{ cursor:'pointer', flex:1, background: brush.running ? '#f59e0b' : 'linear-gradient(135deg, #06b6d4, #0ea5e9)', color:'#fff', fontFamily:'var(--display)', fontSize:22, fontWeight:600, padding:'16px 14px', borderRadius:18, textAlign:'center', boxShadow:'0 10px 22px -8px #0ea5e9' }}>{brush.running ? '⏸ Pauza' : '▶ Start'}</div>
                <div onClick={resetBrush} style={{ cursor:'pointer', padding:'16px 20px', borderRadius:18, background:'#fff', fontFamily:'var(--display)', fontSize:22, fontWeight:500, color:'#075985' }}>↺</div>
              </div>

              {brushElapsed >= 120 && (
                <div style={{ background:'linear-gradient(135deg, #16a34a, #15803d)', color:'#fff', borderRadius:18, padding:'18px 20px', textAlign:'center', animation:'popIn .5s ease' }}>
                  <div style={{ fontSize:34 }}>🦷✨</div>
                  <div style={{ fontFamily:'var(--display)', fontSize:22, fontWeight:700, marginTop:4 }}>Zoubky jsou ČISTÉ!</div>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
      )}

      {/* ===================== CHYTRÁ TLAČÍTKA ===================== */}
      {screen === 'tlacitka' && (
      <div data-screen-label="Chytrá tlačítka" style={{ position:'absolute', inset:0, padding:'26px 30px', display:'flex', flexDirection:'column', gap:18, overflow:'auto' }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div onClick={() => go('home')} style={{ cursor:'pointer', width:52, height:52, borderRadius:17, background:'var(--surface)', border:'var(--hair)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:23, boxShadow:'var(--shadow)' }}>←</div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--display)', fontSize:32, fontWeight:600, color:'var(--ink)', lineHeight:1 }}>Chytrá tlačítka 🔘</div>
            <div style={{ fontSize:15, fontWeight:800, color:'var(--muted)' }}>Jakmile něco uděláš, zmáčkni tlačítko — hned máš body</div>

        <div style={{ display:'flex', alignItems:'center', gap:14, background:'var(--soft)', borderRadius:18, padding:'16px 18px' }}>
          <div style={{ fontSize:30 }}>💡</div>

            <div key={d.id} onClick={() => pressDevice(d)} style={{ cursor:'pointer', background:'var(--surface)', border:'var(--hair)', borderRadius:26, padding:'26px 20px', display:'flex', flexDirection:'column', alignItems:'center', gap:14, boxShadow:'var(--shadow)', transition:'transform .12s' }}>

              </div>
              <div style={{ display:'flex', alignItems:'center', gap:6, background:'var(--soft)', color:'var(--accent)', fontFamily:'var(--display)', fontWeight:600, fontSize:18, padding:'8px 16px', borderRadius:14 }}>+{d.points} bodů ⭐</div>
            </div>
          ))}
        </div>

        <div style={{ background:'var(--surface)', border:'var(--hair)', borderRadius:22, padding:'20px 22px', boxShadow:'var(--shadow)' }}>
          <div style={{ fontFamily:'var(--display)', fontSize:20, fontWeight:600, color:'var(--ink)', marginBottom:8 }}>Jak to zapojit doopravdy</div>
          <div style={{ fontSize:15, fontWeight:700, color:'var(--muted)', lineHeight:1.5 }}>Stačí malé bezdrátové tlačítko (např. <span style={{ color:'var(--ink)' }}>Flic</span>, <span style={{ color:'var(--ink)' }}>Shelly Button</span> nebo <span style={{ color:'var(--ink)' }}>ESP32</span>). Nalepíš ho u záchodu a umyvadla. Při stisku pošle přes Wi‑Fi signál do téhle aplikace, ta sama odškrtne krok a přičte body — dítě nemusí na nic sahat na tabletu.</div>
        </div>
      </div>
      )}

      </React.Fragment>
      )}

      {/* v55: Worry box odstraněn - feature kompletně pryč */}

      {/* ===================== PARENT OVERLAY (fullscreen) ===================== */}
      {parentOpen && (
      <div data-screen-label="Rodičovský režim" style={{ position:'fixed', inset:0, zIndex:80, background:'rgba(15,12,28,.55)', backdropFilter:'blur(4px)', display:'flex', alignItems:'stretch', justifyContent:'center', padding:0 }}>
        <div onClick={closeParent} style={{ position:'absolute', inset:0 }}/>
        <div style={{ position:'relative', width:'100%', maxWidth:1100, height:'100%', background:'#f4f4fb', borderRadius:0, overflow:'hidden', display:'flex', flexDirection:'column', boxShadow:'0 40px 90px -20px rgba(0,0,0,.5)', animation:'slideUp .4s ease' }}>

            {parentLocked && (
            <div style={{ flex:1, background:'linear-gradient(170deg,#2a2350,#161229)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:22, padding:34, textAlign:'center' }}>
              <div style={{ fontSize:50 }}>🔒</div>
              <div style={{ fontFamily:'var(--display)', fontSize:25, fontWeight:600, color:'#fff' }}>Rodičovský režim</div>

              <div style={{ display:'flex', gap:13 }}>
                {pinDots.map((p, i) => (
                  <div key={i} style={{ width:17, height:17, borderRadius:'50%', background: p.bg, border:'2px solid rgba(255,255,255,.4)' }}/>

              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,72px)', gap:14, marginTop:6 }}>
                {pinKeys.map((k, i) => (
                  <div key={i} onClick={() => { if (k.k !== '') pinPress(k.k); }} style={{ cursor: k.k === '' ? 'default' : 'pointer', height:72, borderRadius:'50%', background: k.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--display)', fontSize:28, fontWeight:500, color:'#fff' }}>{k.label}</div>
                ))}
              </div>
              {!isMobile && (
                <div onClick={closeParent} style={{ cursor:'pointer', fontSize:13, fontWeight:800, color:'rgba(255,255,255,.45)', marginTop:8 }}>Zavřít</div>
              )}
            </div>
            )}

            {!parentLocked && (
            <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column' }}>
              <div style={{ background:'linear-gradient(135deg,var(--accent),var(--accent2))', padding:'30px 22px 18px', color:'#fff' }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:800, opacity:.85, textTransform:'uppercase', letterSpacing:'.08em' }}>Rodičovský režim</div>
                    <div style={{ fontFamily:'var(--display)', fontSize:25, fontWeight:600 }}>{childName} · {child.points} bodů</div>
                  </div>
                  {!isMobile && (
                    <div onClick={closeParent} style={{ cursor:'pointer', width:38, height:38, borderRadius:'50%', background:'rgba(255,255,255,.22)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:20 }}>✕</div>
                  )}
                </div>
              </div>

              <div style={{ flex:1, minHeight:0, overflowY:'auto', overflowX:'hidden', WebkitOverflowScrolling:'touch', padding:16 }}>
                {/* TAB: body */}
                {parentTab === 'body' && (
                <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                  <div style={{ background:'#fff', borderRadius:20, padding:18, boxShadow:'0 4px 16px rgba(20,16,40,.06)' }}>
                    <div style={{ fontFamily:'var(--display)', fontSize:18, fontWeight:600, color:'#1a1530' }}>Přidat body</div>
                    <div style={{ display:'flex', gap:10, marginTop:12 }}>
                      {[5,10,20].map((n) => (
                        <div key={n} onClick={() => parentAddPoints(n)} style={{ cursor:'pointer', flex:1, textAlign:'center', background:'linear-gradient(135deg,var(--accent),var(--accent2))', color:'#fff', fontFamily:'var(--display)', fontSize:24, fontWeight:600, padding:'16px 0', borderRadius:16 }}>+{n}</div>
                      ))}
                    </div>
                    <div style={{ fontSize:13, fontWeight:800, color:'#8a86a0', margin:'14px 0 8px' }}>Za co? (rychlý důvod)</div>

                                    setNewRewardPhoto(canvas.toDataURL('image/jpeg', 0.85));

                      return (
                        <g key={i}>
                          <path d={`M 0 0 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`} fill={seg.color} stroke="#fff" strokeWidth="3"/>
                          <text x={lx} y={ly} fill="#fff" fontSize="22" fontWeight="900" textAnchor="middle" dominantBaseline="middle" style={{ pointerEvents:'none', fontFamily:'var(--display)' }}>{seg.label}</text>
                        </g>
                      );
                    });
                  })()}
                  <circle cx="0" cy="0" r="22" fill="#fff" stroke="#fbbf24" strokeWidth="3"/>
                  <text x="0" y="6" fill="#fbbf24" fontSize="22" fontWeight="900" textAnchor="middle">⭐</text>
                </svg>
              </div>

              {!spinning && (
                <div onClick={() => {
                  // Spin - random reward (waitedrandomwithpondetnosti)
                  // Spin animation: rotate 5-7 full + random 0-360
                  const segments = [5, 10, 20, 5, 15, 50, 10, 100];
                  // Realistic distribution: 40% chance 5, 30% chance 10/15, 20% chance 20, 8% chance 50, 2% chance 100
                  const r = Math.random();
                  let idx;
                  if (r < 0.20) idx = 0; // 5
                  else if (r < 0.40) idx = 3; // 5 (second 5 slot)
                  else if (r < 0.60) idx = 1; // 10
                  else if (r < 0.75) idx = 6; // 10 (second 10)
                  else if (r < 0.85) idx = 4; // 15
                  else if (r < 0.93) idx = 2; // 20
                  else if (r < 0.99) idx = 5; // 50
                  else idx = 7; // 100 jackpot

                  const segAngle = 360 / 8;
                  // Cílový úhel = středu segmentu nahoru pod pointer (který je nahoře = 0°)
                  // Segment i je na angle = i * 45 (poté co odečtu 90 jelikož svg start je vrchol)
                  // Pro pointer nahoře: chci aby wheel se otočil tak, aby segment končil pod pointerem
                  const targetAngle = -(idx * segAngle + segAngle/2);
                  const finalRotation = 360 * 6 + targetAngle + (Math.random() * 6 - 3); // 6 plné otočky + cíl + malá variance
                  setSpinning(true);
                  setSpinRotation(finalRotation);
                  audio.coin();
                  setTimeout(() => {
                    const won = segments[idx];
                    setPoints(p => p + won);
                    setTotalXp(x => x + won);
                    setSpinResult(won);
                    setSpinning(false);
                    setSpinWheelLastDate(todayISO());
                    if (won >= 50) {
                      confetti.fire({ n: 250 });
                      audio.success();
                      if (playVoiceRef.current) playVoiceRef.current('jackpot', 'Jackpot, ' + won + ' bodů!');
                    } else {
                      confetti.fire({ n: 50 });
                      audio.success();
                    }
                  }, 4200);
                }} style={{ cursor:'pointer', background:'linear-gradient(135deg, #fbbf24, #f59e0b)', color:'#7c2d12', fontFamily:'var(--display)', fontSize:24, fontWeight:700, padding:'16px 38px', borderRadius:18, boxShadow:'0 8px 24px rgba(245,158,11,.4)', animation:'softPulse 1.5s ease-in-out infinite' }}>🎰 TOČIT!</div>
              )}
              {spinning && (
                <div style={{ fontFamily:'var(--display)', fontSize:20, fontWeight:700, color:'#fff', opacity:.85 }}>Točí se…</div>
              )}
            </>
          ) : (
            <>
              <div style={{ fontSize:80, marginBottom:10 }}>{spinResult >= 50 ? '🏆' : spinResult >= 20 ? '🎉' : '⭐'}</div>
              <div style={{ fontFamily:'var(--display)', fontSize:48, fontWeight:700, color:'#fbbf24', textAlign:'center' }}>+{spinResult} bodů!</div>
              <div style={{ fontSize:18, fontWeight:700, color:'rgba(255,255,255,.85)', textAlign:'center', marginTop:8, marginBottom:30 }}>
                {spinResult >= 100 ? 'JACKPOT! Neuvěřitelné štěstí!' : spinResult >= 50 ? 'Skvělý úlovek!' : spinResult >= 20 ? 'Dobrá rána!' : 'Hezky!'}
              </div>
              <div onClick={() => { setShowSpinWheel(false); setSpinResult(null); audio.tap(); }} style={{ cursor:'pointer', background:'rgba(255,255,255,.95)', color:'#1a1530', fontFamily:'var(--display)', fontSize:18, fontWeight:700, padding:'14px 36px', borderRadius:16 }}>Pokračovat</div>
            </>
          )}
        </div>
      )}

      {/* v48: BOMBA modal - když nestihne rutinu */}
      {showBomb && (
        <div style={{ position:'absolute', inset:0, zIndex:90, background:'#000', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:30, animation:'shake 0.4s ease infinite' }}>
          {/* Exploze pomocí radial gradient */}
          <div style={{ position:'absolute', inset:0, background:'radial-gradient(circle at center, #fbbf24 0%, #f97316 25%, #dc2626 50%, #7f1d1d 75%, #000 100%)', animation:'explosionPulse .5s ease-in-out infinite', opacity:.8 }}/>

          <div style={{ position:'relative', zIndex:1, textAlign:'center' }}>
            <div style={{ fontSize:160, lineHeight:1, animation:'popIn .4s ease' }}>💥</div>
            <div style={{ fontFamily:'var(--display)', fontSize:64, fontWeight:700, color:'#fbbf24', textShadow:'0 4px 16px rgba(0,0,0,.8)', letterSpacing:'.05em', marginTop:8 }}>BOOM!</div>
            <div style={{ fontFamily:'var(--display)', fontSize:24, fontWeight:600, color:'#fff', marginTop:14, maxWidth:520, lineHeight:1.3, textShadow:'0 2px 8px rgba(0,0,0,.8)' }}>Nestihl/a jsi to do času! Bomba vybuchla.</div>
            <div style={{ fontSize:16, fontWeight:700, color:'rgba(255,255,255,.85)', marginTop:10, maxWidth:480, lineHeight:1.4 }}>Žádné body se neztratí, jen pro zábavu. Zítra to dáš líp!</div>
            <div onClick={() => { setShowBomb(false); audio.tap(); }} style={{ cursor:'pointer', marginTop:24, display:'inline-block', background:'rgba(255,255,255,.95)', color:'#1a1530', fontFamily:'var(--display)', fontSize:20, fontWeight:700, padding:'14px 36px', borderRadius:16 }}>Pokračovat</div>
          </div>
        </div>
      )}

      {/* v2: Noční režim overlay */}
      {isNightMode && !parentOpen && (
        <div style={{ position:'absolute', inset:0, zIndex:65, background:'linear-gradient(180deg, #0a0820 0%, #1a1140 100%)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:'#fff', animation:'popIn .8s ease' }}>
          {/* hvězdy */}
          {[...Array(40)].map((_, i) => (
            <div key={i} style={{ position:'absolute', top: (Math.random()*60)+'%', left: (Math.random()*100)+'%', width: (Math.random()*3+1)+'px', height: (Math.random()*3+1)+'px', background:'#fff', borderRadius:'50%', opacity: 0.3+Math.random()*0.7, animation:`blink ${3+Math.random()*4}s infinite` }}/>
          ))}
          <div style={{ position:'absolute', top:30, right:40, fontSize:46 }}>🌙</div>
          <div style={{ transform:'scale(1.4)', marginBottom:30 }}>
            <Mascot size={180} kind={mascotKind} sleeping={true}/>
          </div>
          <div style={{ fontFamily:'var(--display)', fontSize:46, fontWeight:700, textAlign:'center' }}>Dobrou noc</div>
          <div style={{ fontSize:18, fontWeight:700, opacity:.7, marginTop:8, textAlign:'center' }}>{mascotName} už spí. Spinkej krásně.</div>
          <div style={{ marginTop:36, display:'flex', gap:14 }}>
            <div onClick={() => { setParentOpen(true); audio.tap(); }} style={{ cursor:'pointer', background:'rgba(255,255,255,.12)', border:'1px solid rgba(255,255,255,.22)', borderRadius:14, padding:'12px 22px', fontSize:14, fontWeight:800, letterSpacing:'.05em' }}>Rodič</div>
          </div>
        </div>
      )}

    </div>
  );
}

// ====================================================================
// MOUNT
// ====================================================================
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null, info: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) {
    this.setState({ error, info });
    try { console.error('[ErrorBoundary]', error, info); } catch(e) {}
  }
  reset() {
    try { localStorage.removeItem('dompomocnik_v1'); } catch(e) {}
    window.location.reload();
  }
  render() {
    if (this.state.error) {
      const errStr = String(this.state.error.message || this.state.error);
      const stackStr = (this.state.info && this.state.info.componentStack) || this.state.error.stack || '';
      return (
        <div style={{ padding: '30px 24px', maxWidth: 720, margin: '40px auto', fontFamily: 'system-ui, sans-serif', color: '#1a1530' }}>
          <div style={{ fontSize: 36 }}>⚠️</div>
          <h1 style={{ fontSize: 22, fontWeight: 700, marginTop: 12 }}>Něco se rozbilo</h1>
          <p style={{ fontSize: 15, color: '#5a566e', lineHeight: 1.5 }}>
            Aplikace narazila na chybu při zobrazování. Pošli mi prosím text dole, opravím to.
          </p>
          <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 12, padding: 14, marginTop: 14, fontFamily: 'monospace', fontSize: 12, color: '#991b1b', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
            {errStr}{'\n\n'}{stackStr}
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
            <button onClick={() => window.location.reload()} style={{ flex: 1, background: '#2f6bff', color: '#fff', border: 'none', borderRadius: 12, padding: '12px 16px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>Zkusit znovu</button>
            <button onClick={() => this.reset()} style={{ flex: 1, background: '#fee2e2', color: '#991b1b', border: 'none', borderRadius: 12, padding: '12px 16px', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>Reset dat (smaže lokál)</button>
          </div>
          <p style={{ fontSize: 12, color: '#9a96ac', marginTop: 14, lineHeight: 1.5 }}>
            "Reset dat" smaže lokální data v prohlížeči. Pokud máš sync zapnutý, data se po reloadu načtou ze serveru.
          </p>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);

</script>
